[pytest]
# Pytest configuration. `integration/` holds the slow/GPU-touching MPS
# tests; the top-level `test_*.py` files in this directory are fast unit
# tests that should run on every push.

testpaths = . integration

# Markers for organizing tests
markers =
    critical: Critical tests that must pass for production
    high: High priority tests
    medium: Medium priority tests
    low: Low priority tests
    integration: Integration tests across multiple agents
    e2e: End-to-end workflow tests
    slow: Tests that take a long time to run
    performance: Performance benchmark tests
    regression: Regression tests for known issues

# Test output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage options (if pytest-cov is installed)
# addopts = --cov=midi_generator --cov-report=html --cov-report=term

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.8
