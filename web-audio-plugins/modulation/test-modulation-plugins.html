<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulation Plugins Test Suite</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        h1 {
            color: #4CAF50;
            text-align: center;
        }
        .plugin-section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .plugin-section h2 {
            color: #64B5F6;
            margin-top: 0;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        .control {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
        }
        input[type="number"] {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 4px;
        }
        select {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 4px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
        }
        .status.success {
            background: #1b5e20;
            border: 1px solid #4CAF50;
        }
        .status.error {
            background: #b71c1c;
            border: 1px solid #f44336;
        }
        .status.info {
            background: #1a237e;
            border: 1px solid #2196F3;
        }
        #global-controls {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>🎛️ Modulation Plugins Test Suite</h1>
    <p style="text-align: center; color: #aaa;">Agent 4 - AudioWorklet Implementation</p>

    <div id="global-controls">
        <button id="startBtn">Start Audio Context</button>
        <button id="testAllBtn" disabled>Run All Tests</button>
        <button id="stopBtn" disabled>Stop All</button>
        <span id="audioContextStatus" style="margin-left: auto; color: #aaa;">Audio Context: Not Started</span>
    </div>

    <div id="test-results"></div>

    <!-- Chorus Plugin -->
    <div class="plugin-section">
        <h2>Chorus Plugin</h2>
        <div class="controls">
            <div class="control">
                <label for="chorusRate">Rate: <span id="chorusRateValue">0.5</span> Hz</label>
                <input type="range" id="chorusRate" min="0.01" max="10" step="0.01" value="0.5">
            </div>
            <div class="control">
                <label for="chorusDepth">Depth: <span id="chorusDepthValue">50</span>%</label>
                <input type="range" id="chorusDepth" min="0" max="100" step="1" value="50">
            </div>
            <div class="control">
                <label for="chorusVoices">Voices: <span id="chorusVoicesValue">2</span></label>
                <input type="range" id="chorusVoices" min="1" max="8" step="1" value="2">
            </div>
            <div class="control">
                <label for="chorusMix">Mix: <span id="chorusMixValue">50</span>%</label>
                <input type="range" id="chorusMix" min="0" max="100" step="1" value="50">
            </div>
        </div>
        <button id="testChorusBtn" disabled>Test Chorus</button>
        <div id="chorusStatus"></div>
    </div>

    <!-- Flanger Plugin -->
    <div class="plugin-section">
        <h2>Flanger Plugin</h2>
        <div class="controls">
            <div class="control">
                <label for="flangerRate">Rate: <span id="flangerRateValue">0.3</span> Hz</label>
                <input type="range" id="flangerRate" min="0.01" max="10" step="0.01" value="0.3">
            </div>
            <div class="control">
                <label for="flangerDepth">Depth: <span id="flangerDepthValue">100</span>%</label>
                <input type="range" id="flangerDepth" min="0" max="100" step="1" value="100">
            </div>
            <div class="control">
                <label for="flangerFeedback">Feedback: <span id="flangerFeedbackValue">50</span>%</label>
                <input type="range" id="flangerFeedback" min="0" max="100" step="1" value="50">
            </div>
            <div class="control">
                <label for="flangerMix">Mix: <span id="flangerMixValue">50</span>%</label>
                <input type="range" id="flangerMix" min="0" max="100" step="1" value="50">
            </div>
        </div>
        <button id="testFlangerBtn" disabled>Test Flanger</button>
        <div id="flangerStatus"></div>
    </div>

    <!-- Phaser Plugin -->
    <div class="plugin-section">
        <h2>Phaser Plugin</h2>
        <div class="controls">
            <div class="control">
                <label for="phaserRate">Rate: <span id="phaserRateValue">0.5</span> Hz</label>
                <input type="range" id="phaserRate" min="0.01" max="10" step="0.01" value="0.5">
            </div>
            <div class="control">
                <label for="phaserDepth">Depth: <span id="phaserDepthValue">100</span>%</label>
                <input type="range" id="phaserDepth" min="0" max="100" step="1" value="100">
            </div>
            <div class="control">
                <label for="phaserFeedback">Feedback: <span id="phaserFeedbackValue">50</span>%</label>
                <input type="range" id="phaserFeedback" min="0" max="100" step="1" value="50">
            </div>
            <div class="control">
                <label for="phaserStages">Stages: <span id="phaserStagesValue">4</span></label>
                <input type="range" id="phaserStages" min="2" max="8" step="2" value="4">
            </div>
            <div class="control">
                <label for="phaserMix">Mix: <span id="phaserMixValue">50</span>%</label>
                <input type="range" id="phaserMix" min="0" max="100" step="1" value="50">
            </div>
        </div>
        <button id="testPhaserBtn" disabled>Test Phaser</button>
        <div id="phaserStatus"></div>
    </div>

    <!-- Tremolo Plugin -->
    <div class="plugin-section">
        <h2>Tremolo Plugin</h2>
        <div class="controls">
            <div class="control">
                <label for="tremoloRate">Rate: <span id="tremoloRateValue">5.0</span> Hz</label>
                <input type="range" id="tremoloRate" min="0.1" max="20" step="0.1" value="5.0">
            </div>
            <div class="control">
                <label for="tremoloDepth">Depth: <span id="tremoloDepthValue">50</span>%</label>
                <input type="range" id="tremoloDepth" min="0" max="100" step="1" value="50">
            </div>
            <div class="control">
                <label for="tremoloWaveform">Waveform:</label>
                <select id="tremoloWaveform">
                    <option value="sine">Sine</option>
                    <option value="triangle">Triangle</option>
                    <option value="square">Square</option>
                    <option value="saw">Saw</option>
                </select>
            </div>
        </div>
        <button id="testTremoloBtn" disabled>Test Tremolo</button>
        <div id="tremoloStatus"></div>
    </div>

    <script type="module">
        import ChorusPlugin from './ChorusPlugin.js';
        import FlangerPlugin from './FlangerPlugin.js';
        import PhaserPlugin from './PhaserPlugin.js';
        import TremoloPlugin from './TremoloPlugin.js';

        let audioContext = null;
        let oscillator = null;
        let currentPlugin = null;

        // Setup UI controls
        const startBtn = document.getElementById('startBtn');
        const testAllBtn = document.getElementById('testAllBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioContextStatus = document.getElementById('audioContextStatus');

        startBtn.addEventListener('click', async () => {
            try {
                audioContext = new AudioContext();
                audioContextStatus.textContent = `Audio Context: Running (${audioContext.sampleRate} Hz)`;
                audioContextStatus.style.color = '#4CAF50';

                startBtn.disabled = true;
                testAllBtn.disabled = false;
                stopBtn.disabled = false;

                // Enable all test buttons
                document.getElementById('testChorusBtn').disabled = false;
                document.getElementById('testFlangerBtn').disabled = false;
                document.getElementById('testPhaserBtn').disabled = false;
                document.getElementById('testTremoloBtn').disabled = false;

                addStatus('test-results', 'Audio Context initialized successfully', 'success');
            } catch (error) {
                addStatus('test-results', `Failed to start Audio Context: ${error.message}`, 'error');
            }
        });

        stopBtn.addEventListener('click', () => {
            if (oscillator) {
                oscillator.stop();
                oscillator = null;
            }
            if (currentPlugin) {
                currentPlugin.dispose();
                currentPlugin = null;
            }
        });

        // Helper function to create test tone
        function createTestTone() {
            if (oscillator) {
                oscillator.stop();
            }
            oscillator = audioContext.createOscillator();
            oscillator.frequency.value = 440; // A4
            oscillator.type = 'sawtooth';
            return oscillator;
        }

        // Helper function to add status messages
        function addStatus(elementId, message, type = 'info') {
            const statusDiv = document.getElementById(elementId);
            const messageDiv = document.createElement('div');
            messageDiv.className = `status ${type}`;
            messageDiv.textContent = message;
            statusDiv.appendChild(messageDiv);
            setTimeout(() => messageDiv.remove(), 5000);
        }

        // Chorus Plugin Test
        document.getElementById('testChorusBtn').addEventListener('click', async () => {
            try {
                if (currentPlugin) currentPlugin.dispose();

                const plugin = new ChorusPlugin(audioContext);
                await plugin.initialize({
                    rate: parseFloat(document.getElementById('chorusRate').value),
                    depth: parseFloat(document.getElementById('chorusDepth').value),
                    voices: parseInt(document.getElementById('chorusVoices').value),
                    mix: parseFloat(document.getElementById('chorusMix').value)
                });

                const tone = createTestTone();
                tone.connect(plugin.input);
                plugin.connect(audioContext.destination);
                tone.start();

                currentPlugin = plugin;
                addStatus('chorusStatus', 'Chorus plugin initialized and playing', 'success');

                // Setup parameter controls
                setupControls('chorus', plugin);
            } catch (error) {
                addStatus('chorusStatus', `Error: ${error.message}`, 'error');
            }
        });

        // Flanger Plugin Test
        document.getElementById('testFlangerBtn').addEventListener('click', async () => {
            try {
                if (currentPlugin) currentPlugin.dispose();

                const plugin = new FlangerPlugin(audioContext);
                await plugin.initialize({
                    rate: parseFloat(document.getElementById('flangerRate').value),
                    depth: parseFloat(document.getElementById('flangerDepth').value),
                    feedback: parseFloat(document.getElementById('flangerFeedback').value),
                    mix: parseFloat(document.getElementById('flangerMix').value)
                });

                const tone = createTestTone();
                tone.connect(plugin.input);
                plugin.connect(audioContext.destination);
                tone.start();

                currentPlugin = plugin;
                addStatus('flangerStatus', 'Flanger plugin initialized and playing', 'success');

                // Setup parameter controls
                setupControls('flanger', plugin);
            } catch (error) {
                addStatus('flangerStatus', `Error: ${error.message}`, 'error');
            }
        });

        // Phaser Plugin Test
        document.getElementById('testPhaserBtn').addEventListener('click', async () => {
            try {
                if (currentPlugin) currentPlugin.dispose();

                const plugin = new PhaserPlugin(audioContext);
                await plugin.initialize({
                    rate: parseFloat(document.getElementById('phaserRate').value),
                    depth: parseFloat(document.getElementById('phaserDepth').value),
                    feedback: parseFloat(document.getElementById('phaserFeedback').value),
                    stages: parseInt(document.getElementById('phaserStages').value),
                    mix: parseFloat(document.getElementById('phaserMix').value)
                });

                const tone = createTestTone();
                tone.connect(plugin.input);
                plugin.connect(audioContext.destination);
                tone.start();

                currentPlugin = plugin;
                addStatus('phaserStatus', 'Phaser plugin initialized and playing', 'success');

                // Setup parameter controls
                setupControls('phaser', plugin);
            } catch (error) {
                addStatus('phaserStatus', `Error: ${error.message}`, 'error');
            }
        });

        // Tremolo Plugin Test
        document.getElementById('testTremoloBtn').addEventListener('click', async () => {
            try {
                if (currentPlugin) currentPlugin.dispose();

                const plugin = new TremoloPlugin(audioContext);
                await plugin.initialize({
                    rate: parseFloat(document.getElementById('tremoloRate').value),
                    depth: parseFloat(document.getElementById('tremoloDepth').value),
                    waveform: document.getElementById('tremoloWaveform').value
                });

                const tone = createTestTone();
                tone.connect(plugin.input);
                plugin.connect(audioContext.destination);
                tone.start();

                currentPlugin = plugin;
                addStatus('tremoloStatus', 'Tremolo plugin initialized and playing', 'success');

                // Setup parameter controls
                setupControls('tremolo', plugin);
            } catch (error) {
                addStatus('tremoloStatus', `Error: ${error.message}`, 'error');
            }
        });

        // Setup parameter control listeners
        function setupControls(pluginName, plugin) {
            const controls = {
                chorus: ['rate', 'depth', 'voices', 'mix'],
                flanger: ['rate', 'depth', 'feedback', 'mix'],
                phaser: ['rate', 'depth', 'feedback', 'stages', 'mix'],
                tremolo: ['rate', 'depth', 'waveform']
            };

            controls[pluginName].forEach(param => {
                const element = document.getElementById(`${pluginName}${param.charAt(0).toUpperCase() + param.slice(1)}`);
                const valueDisplay = document.getElementById(`${pluginName}${param.charAt(0).toUpperCase() + param.slice(1)}Value`);

                if (element && valueDisplay) {
                    element.addEventListener('input', (e) => {
                        const value = e.target.type === 'number' || e.target.type === 'range'
                            ? parseFloat(e.target.value)
                            : e.target.value;

                        if (valueDisplay.tagName !== 'SELECT') {
                            valueDisplay.textContent = value;
                        }

                        // Update plugin parameter
                        const methodName = `set${param.charAt(0).toUpperCase() + param.slice(1)}`;
                        if (plugin[methodName]) {
                            plugin[methodName](value);
                        }
                    });
                }
            });
        }

        // Run all tests
        testAllBtn.addEventListener('click', async () => {
            addStatus('test-results', 'Running automated tests...', 'info');

            const plugins = [
                { name: 'Chorus', class: ChorusPlugin },
                { name: 'Flanger', class: FlangerPlugin },
                { name: 'Phaser', class: PhaserPlugin },
                { name: 'Tremolo', class: TremoloPlugin }
            ];

            for (const { name, class: PluginClass } of plugins) {
                try {
                    const plugin = new PluginClass(audioContext);
                    await plugin.initialize();

                    if (plugin.usesAudioWorklet()) {
                        addStatus('test-results', `✓ ${name}: AudioWorklet initialized`, 'success');
                    } else {
                        addStatus('test-results', `✗ ${name}: AudioWorklet failed (using fallback)`, 'error');
                    }

                    plugin.dispose();
                } catch (error) {
                    addStatus('test-results', `✗ ${name}: ${error.message}`, 'error');
                }
            }
        });
    </script>
</body>
</html>
