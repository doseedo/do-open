<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distortion Plugins AudioWorklet Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 {
            color: #4CAF50;
        }
        .plugin-section {
            background: #2a2a2a;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .control-group {
            margin: 10px 0;
        }
        label {
            display: inline-block;
            width: 150px;
            color: #aaa;
        }
        input[type="range"] {
            width: 300px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background: #333;
        }
        .status.success {
            background: #1b5e20;
        }
        .status.error {
            background: #b71c1c;
        }
        select {
            padding: 5px;
            font-size: 14px;
        }
        .value-display {
            display: inline-block;
            min-width: 50px;
            text-align: right;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>🔊 Distortion Plugins AudioWorklet Test</h1>

    <div class="status" id="status">
        <strong>Status:</strong> Initializing...
    </div>

    <button id="startBtn">Start Audio</button>
    <button id="stopBtn" disabled>Stop Audio</button>

    <!-- Distortion Plugin -->
    <div class="plugin-section">
        <h2>Distortion Plugin</h2>
        <div class="control-group">
            <label>Drive (0-100%):</label>
            <input type="range" id="distDrive" min="0" max="100" value="50">
            <span class="value-display" id="distDriveVal">50</span>
        </div>
        <div class="control-group">
            <label>Tone (Hz):</label>
            <input type="range" id="distTone" min="20" max="20000" value="1000">
            <span class="value-display" id="distToneVal">1000</span>
        </div>
        <div class="control-group">
            <label>Clip Type:</label>
            <select id="distType">
                <option value="hard">Hard</option>
                <option value="soft">Soft</option>
                <option value="tanh">Tanh</option>
                <option value="asymmetric">Asymmetric</option>
                <option value="foldback">Foldback</option>
            </select>
        </div>
        <div class="control-group">
            <label>Mix (0-100%):</label>
            <input type="range" id="distMix" min="0" max="100" value="100">
            <span class="value-display" id="distMixVal">100</span>
        </div>
    </div>

    <!-- Saturator Plugin -->
    <div class="plugin-section">
        <h2>Saturator Plugin</h2>
        <div class="control-group">
            <label>Drive (0-100%):</label>
            <input type="range" id="satDrive" min="0" max="100" value="30">
            <span class="value-display" id="satDriveVal">30</span>
        </div>
        <div class="control-group">
            <label>Type:</label>
            <select id="satType">
                <option value="warm" selected>Warm</option>
                <option value="digital">Digital</option>
                <option value="analog">Analog</option>
                <option value="clip">Clip</option>
                <option value="foldback">Foldback</option>
                <option value="sine-fold">Sine Fold</option>
            </select>
        </div>
        <div class="control-group">
            <label>Color (0-100%):</label>
            <input type="range" id="satColor" min="0" max="100" value="0">
            <span class="value-display" id="satColorVal">0</span>
        </div>
        <div class="control-group">
            <label>Mix (0-100%):</label>
            <input type="range" id="satMix" min="0" max="100" value="100">
            <span class="value-display" id="satMixVal">100</span>
        </div>
    </div>

    <!-- Redux Plugin -->
    <div class="plugin-section">
        <h2>Redux Plugin (Bit Crusher)</h2>
        <div class="control-group">
            <label>Bit Depth (1-16):</label>
            <input type="range" id="reduxBits" min="1" max="16" value="8">
            <span class="value-display" id="reduxBitsVal">8</span>
        </div>
        <div class="control-group">
            <label>Sample Rate (Hz):</label>
            <input type="range" id="reduxRate" min="50" max="44100" value="22050">
            <span class="value-display" id="reduxRateVal">22050</span>
        </div>
        <div class="control-group">
            <label>Hardness (0-100%):</label>
            <input type="range" id="reduxHard" min="0" max="100" value="50">
            <span class="value-display" id="reduxHardVal">50</span>
        </div>
        <div class="control-group">
            <label>Mix (0-100%):</label>
            <input type="range" id="reduxMix" min="0" max="100" value="100">
            <span class="value-display" id="reduxMixVal">100</span>
        </div>
    </div>

    <script type="module">
        import Distortion from './Distortion.js';
        import Saturator from './Saturator.js';
        import Redux from './Redux.js';

        let audioContext = null;
        let oscillator = null;
        let distortion = null;
        let saturator = null;
        let redux = null;
        let currentPlugin = null;

        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        function updateStatus(message, isError = false) {
            status.textContent = message;
            status.className = 'status ' + (isError ? 'error' : 'success');
        }

        async function initAudio() {
            try {
                audioContext = new AudioContext();
                updateStatus('Audio context created. Initializing plugins...');

                // Create oscillator for testing
                oscillator = audioContext.createOscillator();
                oscillator.frequency.value = 440; // A4
                oscillator.type = 'sawtooth';

                // Initialize plugins (all at once for testing)
                distortion = new Distortion(audioContext);
                await distortion.initialize();

                saturator = new Saturator(audioContext);
                await saturator.initialize();

                redux = new Redux(audioContext);
                await redux.initialize();

                // Start with Distortion
                currentPlugin = distortion;

                // Connect: oscillator → distortion → output
                oscillator.connect(currentPlugin.input);
                currentPlugin.connect(audioContext.destination);

                oscillator.start();

                updateStatus('✓ All plugins initialized successfully!', false);
                startBtn.disabled = true;
                stopBtn.disabled = false;

                // Setup parameter controls
                setupControls();

            } catch (error) {
                updateStatus('✗ Error: ' + error.message, true);
                console.error('Initialization error:', error);
            }
        }

        function stopAudio() {
            if (oscillator) {
                oscillator.stop();
                oscillator = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            updateStatus('Audio stopped');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function setupControls() {
            // Distortion controls
            const distDrive = document.getElementById('distDrive');
            const distTone = document.getElementById('distTone');
            const distType = document.getElementById('distType');
            const distMix = document.getElementById('distMix');

            distDrive.oninput = () => {
                const value = parseInt(distDrive.value);
                document.getElementById('distDriveVal').textContent = value;
                distortion.setDrive(value);
            };

            distTone.oninput = () => {
                const value = parseInt(distTone.value);
                document.getElementById('distToneVal').textContent = value;
                distortion.setTone(value);
            };

            distType.onchange = () => {
                distortion.setClipType(distType.value);
            };

            distMix.oninput = () => {
                const value = parseInt(distMix.value);
                document.getElementById('distMixVal').textContent = value;
                distortion.setMix(value);
            };

            // Saturator controls
            const satDrive = document.getElementById('satDrive');
            const satType = document.getElementById('satType');
            const satColor = document.getElementById('satColor');
            const satMix = document.getElementById('satMix');

            satDrive.oninput = () => {
                const value = parseInt(satDrive.value);
                document.getElementById('satDriveVal').textContent = value;
                saturator.setDrive(value);
            };

            satType.onchange = () => {
                saturator.setType(satType.value);
            };

            satColor.oninput = () => {
                const value = parseInt(satColor.value);
                document.getElementById('satColorVal').textContent = value;
                saturator.setColor(value);
            };

            satMix.oninput = () => {
                const value = parseInt(satMix.value);
                document.getElementById('satMixVal').textContent = value;
                saturator.setMix(value);
            };

            // Redux controls
            const reduxBits = document.getElementById('reduxBits');
            const reduxRate = document.getElementById('reduxRate');
            const reduxHard = document.getElementById('reduxHard');
            const reduxMix = document.getElementById('reduxMix');

            reduxBits.oninput = () => {
                const value = parseInt(reduxBits.value);
                document.getElementById('reduxBitsVal').textContent = value;
                redux.setBitDepth(value);
            };

            reduxRate.oninput = () => {
                const value = parseInt(reduxRate.value);
                document.getElementById('reduxRateVal').textContent = value;
                redux.setSampleRate(value);
            };

            reduxHard.oninput = () => {
                const value = parseInt(reduxHard.value);
                document.getElementById('reduxHardVal').textContent = value;
                redux.setHardness(value);
            };

            reduxMix.oninput = () => {
                const value = parseInt(reduxMix.value);
                document.getElementById('reduxMixVal').textContent = value;
                redux.setMix(value);
            };
        }

        startBtn.onclick = initAudio;
        stopBtn.onclick = stopAudio;
    </script>
</body>
</html>
