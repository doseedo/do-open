<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - Human Oversight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-music-note-beamed"></i>
                Music Gen Oversight
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/proposals">
                            <i class="bi bi-clipboard-check"></i> Proposals
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/metrics">
                            <i class="bi bi-graph-up"></i> Metrics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/audit">
                            <i class="bi bi-journal-text"></i> Audit Log
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <h2 class="mb-4">
            <i class="bi bi-journal-text"></i>
            Audit Log
        </h2>

        <!-- Filters -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Action Type</label>
                                <select class="form-select" id="filterActionType">
                                    <option value="">All Actions</option>
                                    <option value="CREATE_PROPOSAL">Create Proposal</option>
                                    <option value="APPROVE_PROPOSAL">Approve Proposal</option>
                                    <option value="REJECT_PROPOSAL">Reject Proposal</option>
                                    <option value="UPDATE_STATUS">Update Status</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Proposal ID</label>
                                <input type="text" class="form-control" id="filterProposalId" placeholder="Enter proposal ID">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Limit</label>
                                <select class="form-select" id="filterLimit">
                                    <option value="50">50 entries</option>
                                    <option value="100" selected>100 entries</option>
                                    <option value="250">250 entries</option>
                                    <option value="500">500 entries</option>
                                </select>
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button class="btn btn-primary w-100" onclick="applyFilters()">
                                    <i class="bi bi-funnel"></i> Apply Filters
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Audit Log Table -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-list-ul"></i>
                            Audit Entries (<span id="entryCount">0</span>)
                        </h5>
                        <div>
                            <button class="btn btn-sm btn-outline-primary" onclick="refreshAuditLog()">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="exportAuditLog()">
                                <i class="bi bi-download"></i> Export
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th>Timestamp</th>
                                        <th>Action</th>
                                        <th>Description</th>
                                        <th>User</th>
                                        <th>Proposal ID</th>
                                        <th>Details</th>
                                    </tr>
                                </thead>
                                <tbody id="auditLogTable">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted p-5">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                            <p class="mt-3">Loading audit log...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Audit Entry Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <pre id="detailsContent" class="bg-light p-3 rounded"></pre>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/audit.js"></script>
</body>
</html>
