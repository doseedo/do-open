# Default Training Configuration for Hierarchical MTL
# Agent 5: Distributed Training Infrastructure
# Date: November 21, 2025

# Optimizer Configuration
optimizer:
  optimizer_type: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eps: 1.0e-08
  momentum: 0.9
  nesterov: true
  clip_grad_norm: 1.0
  clip_grad_value: null

# Scheduler Configuration
scheduler:
  scheduler_type: cosine
  T_max: 100
  eta_min: 1.0e-06
  step_size: 30
  gamma: 0.1
  mode: min
  factor: 0.5
  patience: 10
  threshold: 0.0001
  cooldown: 0
  min_lr: 1.0e-07
  decay_rate: 0.95
  warmup_epochs: 5
  warmup_start_lr: 1.0e-05

# Loss Configuration
loss:
  level1_weight: 1.0
  level2_weight: 1.0
  level3_weight: 1.0
  default_regression_loss: mse
  default_classification_loss: cross_entropy
  huber_delta: 1.0
  use_regularization: true
  l1_reg_weight: 0.0
  l2_reg_weight: 0.0001
  use_consistency_loss: false
  consistency_weight: 0.1

# Data Configuration
data:
  corpus_dir: midi_corpus
  labeled_dataset_path: labeled_dataset_comprehensive.json
  features_dir: features/
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  stratify_by_genre: true
  batch_size: 128
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  use_augmentation: true
  augmentation_prob: 0.3
  noise_std: 0.01
  normalize_features: true
  normalization_method: standardize
  supported_genres:
    - jazz
    - classical
    - rock
    - electronic
    - pop
    - hip-hop
    - latin

# Training Settings
num_epochs: 200
early_stopping_patience: 15
min_delta: 0.0001

# Model Architecture (for scaled 600D -> 300+ params)
shared_encoder_dim: 768
level1_hidden_dim: 256
level2_hidden_dim: 256
level3_hidden_dim: 128
dropout_rate: 0.3

# Checkpointing
checkpoint_dir: checkpoints/hierarchical_mtl
save_every_n_epochs: 5
save_best_only: false
keep_n_checkpoints: 3

# Logging
log_dir: logs/hierarchical_mtl
log_every_n_steps: 10
eval_every_n_epochs: 1

# Experiment Tracking
use_wandb: false
use_mlflow: false
experiment_name: hierarchical_mtl_pretraining
run_name: null
tags: []

# Mixed Precision Training
use_amp: true
amp_dtype: float16

# Distributed Training
distributed: false
world_size: 1
local_rank: 0
backend: nccl
accumulation_steps: 4  # Effective batch = 128 * 4 = 512

# Reproducibility
seed: 42
deterministic: false
benchmark: true

# Device
device: cuda

# Validation
validate_on_start: true
compute_train_metrics: true
