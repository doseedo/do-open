# Fast Experimentation Configuration
# Small model for quick iterations and debugging
# Agent 5: Distributed Training Infrastructure

# Optimizer Configuration
optimizer:
  optimizer_type: adam
  learning_rate: 0.001
  weight_decay: 0.0001
  clip_grad_norm: 1.0

# Scheduler Configuration
scheduler:
  scheduler_type: step
  step_size: 10
  gamma: 0.5
  warmup_epochs: 2

# Loss Configuration
loss:
  level1_weight: 1.0
  level2_weight: 1.0
  level3_weight: 1.0
  default_regression_loss: mse
  default_classification_loss: cross_entropy

# Data Configuration
data:
  corpus_dir: midi_corpus
  labeled_dataset_path: labeled_dataset_comprehensive.json
  features_dir: features/
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  stratify_by_genre: true
  batch_size: 64
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  use_augmentation: false
  normalize_features: true
  normalization_method: standardize

# Training Settings
num_epochs: 30  # Fast iterations
early_stopping_patience: 5
min_delta: 0.001

# Model Architecture (Smaller for fast experimentation)
shared_encoder_dim: 256
level1_hidden_dim: 128
level2_hidden_dim: 128
level3_hidden_dim: 64
dropout_rate: 0.2

# Checkpointing
checkpoint_dir: checkpoints/hierarchical_mtl_fast
save_every_n_epochs: 10
save_best_only: true
keep_n_checkpoints: 2

# Logging
log_dir: logs/hierarchical_mtl_fast
log_every_n_steps: 5
eval_every_n_epochs: 1

# Experiment Tracking
use_wandb: false
use_mlflow: false
experiment_name: hierarchical_mtl_fast_exp
run_name: null

# Mixed Precision Training
use_amp: true
amp_dtype: float16

# Distributed Training
distributed: false
accumulation_steps: 1

# Reproducibility
seed: 42
deterministic: false
benchmark: true

# Device
device: cuda

# Validation
validate_on_start: false
compute_train_metrics: true
