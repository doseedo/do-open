# Distributed Multi-GPU Training Configuration
# Optimized for 4-GPU training with 10K dataset
# Agent 5: Distributed Training Infrastructure

# Optimizer Configuration
optimizer:
  optimizer_type: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eps: 1.0e-08
  clip_grad_norm: 1.0

# Scheduler Configuration
scheduler:
  scheduler_type: cosine
  T_max: 200
  eta_min: 1.0e-06
  warmup_epochs: 10
  warmup_start_lr: 1.0e-05

# Loss Configuration
loss:
  level1_weight: 1.0
  level2_weight: 1.0
  level3_weight: 1.0
  default_regression_loss: mse
  default_classification_loss: cross_entropy
  use_regularization: true
  l2_reg_weight: 0.0001

# Data Configuration
data:
  corpus_dir: midi_corpus
  labeled_dataset_path: labeled_dataset_comprehensive.json
  features_dir: features/
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  stratify_by_genre: true
  batch_size: 128  # Per GPU
  num_workers: 8   # Per GPU
  pin_memory: true
  prefetch_factor: 4
  use_augmentation: true
  augmentation_prob: 0.3
  noise_std: 0.01
  normalize_features: true
  normalization_method: standardize
  supported_genres:
    - jazz
    - classical
    - rock
    - electronic
    - pop
    - hip-hop
    - latin

# Training Settings
num_epochs: 200
early_stopping_patience: 20
min_delta: 0.0001

# Model Architecture (Scaled for 600D -> 300+ params)
shared_encoder_dim: 1024
level1_hidden_dim: 512
level2_hidden_dim: 512
level3_hidden_dim: 256
dropout_rate: 0.3

# Checkpointing
checkpoint_dir: checkpoints/hierarchical_mtl_distributed
save_every_n_epochs: 5
save_best_only: false
keep_n_checkpoints: 3

# Logging
log_dir: logs/hierarchical_mtl_distributed
log_every_n_steps: 10
eval_every_n_epochs: 1

# Experiment Tracking
use_wandb: true
use_mlflow: false
experiment_name: hierarchical_mtl_distributed_10k
run_name: null
tags:
  - distributed
  - 4gpu
  - 10k_dataset

# Mixed Precision Training
use_amp: true
amp_dtype: float16

# Distributed Training
distributed: true
world_size: 4  # 4 GPUs
local_rank: 0
backend: nccl
accumulation_steps: 4  # Effective batch = 128 * 4 GPUs * 4 accumulation = 2048

# Reproducibility
seed: 42
deterministic: false
benchmark: true

# Device
device: cuda

# Validation
validate_on_start: true
compute_train_metrics: true
