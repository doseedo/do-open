<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EQ & Filter Plugin Tests</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #fff;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      color: #667eea;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .test-section {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .test-result {
      padding: 10px;
      margin: 5px 0;
      border-radius: 4px;
      font-family: monospace;
    }

    .pass {
      background: rgba(76, 175, 80, 0.2);
      border-left: 4px solid #4caf50;
      color: #4caf50;
    }

    .fail {
      background: rgba(244, 67, 54, 0.2);
      border-left: 4px solid #f44336;
      color: #f44336;
    }

    .info {
      background: rgba(102, 126, 234, 0.2);
      border-left: 4px solid #667eea;
      color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px 10px 0;
    }

    button:hover {
      opacity: 0.9;
    }

    .summary {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      margin: 20px 0;
      border-radius: 8px;
      font-size: 18px;
    }

    .summary.all-pass {
      border: 2px solid #4caf50;
    }

    .summary.has-fail {
      border: 2px solid #f44336;
    }
  </style>
</head>
<body>
  <h1>🧪 EQ & Filter Plugin Test Suite</h1>

  <button onclick="runAllTests()">Run All Tests</button>
  <button onclick="clearResults()">Clear Results</button>

  <div id="summary"></div>

  <div class="test-section">
    <h2>EQ Eight Tests</h2>
    <div id="eq8-results"></div>
  </div>

  <div class="test-section">
    <h2>EQ Three Tests</h2>
    <div id="eq3-results"></div>
  </div>

  <div class="test-section">
    <h2>Auto Filter Tests</h2>
    <div id="af-results"></div>
  </div>

  <script src="../eq/EQEight.js"></script>
  <script src="../eq/EQThree.js"></script>
  <script src="../filters/AutoFilter.js"></script>

  <script>
    let totalTests = 0;
    let passedTests = 0;
    let failedTests = 0;

    function log(section, message, type = 'info') {
      const div = document.createElement('div');
      div.className = `test-result ${type}`;
      div.textContent = message;
      document.getElementById(section).appendChild(div);

      if (type === 'pass') passedTests++;
      if (type === 'fail') failedTests++;
      totalTests++;
    }

    function clearResults() {
      document.getElementById('eq8-results').innerHTML = '';
      document.getElementById('eq3-results').innerHTML = '';
      document.getElementById('af-results').innerHTML = '';
      document.getElementById('summary').innerHTML = '';
      totalTests = 0;
      passedTests = 0;
      failedTests = 0;
    }

    function updateSummary() {
      const summary = document.getElementById('summary');
      const allPass = failedTests === 0;
      summary.className = `summary ${allPass ? 'all-pass' : 'has-fail'}`;
      summary.innerHTML = `
        <strong>Test Summary:</strong><br>
        Total: ${totalTests} |
        <span style="color: #4caf50">Passed: ${passedTests}</span> |
        <span style="color: #f44336">Failed: ${failedTests}</span>
        ${allPass ? ' ✅ All tests passed!' : ' ❌ Some tests failed'}
      `;
    }

    function assert(condition, message, section) {
      if (condition) {
        log(section, `✓ ${message}`, 'pass');
      } else {
        log(section, `✗ ${message}`, 'fail');
      }
    }

    function testEQEight() {
      log('eq8-results', 'Starting EQ Eight tests...', 'info');

      try {
        const ctx = new AudioContext();
        const eq8 = new EQEight(ctx);

        // Test initialization
        assert(eq8 !== null, 'EQ Eight instance created', 'eq8-results');
        assert(eq8.bands.length === 8, 'Has 8 bands', 'eq8-results');
        assert(eq8.globalGain === 0, 'Global gain initialized to 0', 'eq8-results');

        // Test band parameters
        eq8.setBand(0, { frequency: 100, gain: 5, Q: 2 });
        const band0 = eq8.getBand(0);
        assert(band0.frequency === 100, 'Band frequency set correctly', 'eq8-results');
        assert(band0.gain === 5, 'Band gain set correctly', 'eq8-results');
        assert(band0.Q === 2, 'Band Q set correctly', 'eq8-results');

        // Test global gain
        eq8.setGlobalGain(3);
        assert(eq8.globalGain === 3, 'Global gain set correctly', 'eq8-results');

        // Test filter types
        eq8.setBand(1, { filterType: 'lowshelf' });
        assert(eq8.getBand(1).filterType === 'lowshelf', 'Filter type set correctly', 'eq8-results');

        // Test band enable/disable
        eq8.enableBand(2, false);
        assert(eq8.getBand(2).enabled === false, 'Band disabled correctly', 'eq8-results');

        // Test adaptive Q
        eq8.setAdaptive(true);
        assert(eq8.adaptive === true, 'Adaptive Q enabled', 'eq8-results');

        // Test frequency response
        const freqs = new Float32Array([100, 1000, 10000]);
        const response = eq8.getFrequencyResponse(freqs);
        assert(response.magnitude !== null, 'Frequency response calculated', 'eq8-results');
        assert(response.magnitude.length === 3, 'Frequency response has correct length', 'eq8-results');

        // Test reset
        eq8.reset();
        assert(eq8.globalGain === 0, 'Reset sets global gain to 0', 'eq8-results');

        // Test audio connections
        const testSource = ctx.createOscillator();
        testSource.connect(eq8.getInput());
        eq8.connect(ctx.destination);
        assert(true, 'Audio routing works', 'eq8-results');

        // Cleanup
        eq8.destroy();
        assert(true, 'Cleanup successful', 'eq8-results');

        log('eq8-results', 'EQ Eight tests completed', 'info');
      } catch (e) {
        log('eq8-results', `Error: ${e.message}`, 'fail');
      }
    }

    function testEQThree() {
      log('eq3-results', 'Starting EQ Three tests...', 'info');

      try {
        const ctx = new AudioContext();
        const eq3 = new EQThree(ctx);

        // Test initialization
        assert(eq3 !== null, 'EQ Three instance created', 'eq3-results');
        assert(eq3.lowGain === 1, 'Low gain initialized to 1', 'eq3-results');
        assert(eq3.midGain === 1, 'Mid gain initialized to 1', 'eq3-results');
        assert(eq3.highGain === 1, 'High gain initialized to 1', 'eq3-results');
        assert(eq3.lowFreq === 250, 'Low crossover frequency default correct', 'eq3-results');
        assert(eq3.highFreq === 3500, 'High crossover frequency default correct', 'eq3-results');

        // Test gain controls
        eq3.setLowGain(1.5);
        assert(eq3.lowGain === 1.5, 'Low gain set correctly', 'eq3-results');

        eq3.setMidGain(0.8);
        assert(eq3.midGain === 0.8, 'Mid gain set correctly', 'eq3-results');

        eq3.setHighGain(2);
        assert(eq3.highGain === 2, 'High gain set correctly', 'eq3-results');

        // Test crossover frequencies
        eq3.setLowFrequency(200);
        assert(eq3.lowFreq === 200, 'Low crossover frequency set correctly', 'eq3-results');

        eq3.setHighFrequency(4000);
        assert(eq3.highFreq === 4000, 'High crossover frequency set correctly', 'eq3-results');

        // Test kill band
        eq3.killBand('low');
        assert(eq3.lowGain === 0, 'Kill band sets gain to 0', 'eq3-results');

        // Test reset band
        eq3.resetBand('low');
        assert(eq3.lowGain === 1, 'Reset band restores unity gain', 'eq3-results');

        // Test reset
        eq3.reset();
        const state = eq3.getState();
        assert(state.lowGain === 1 && state.midGain === 1 && state.highGain === 1,
               'Reset restores all gains to unity', 'eq3-results');

        // Test audio connections
        const testSource = ctx.createOscillator();
        testSource.connect(eq3.getInput());
        eq3.connect(ctx.destination);
        assert(true, 'Audio routing works', 'eq3-results');

        // Cleanup
        eq3.destroy();
        assert(true, 'Cleanup successful', 'eq3-results');

        log('eq3-results', 'EQ Three tests completed', 'info');
      } catch (e) {
        log('eq3-results', `Error: ${e.message}`, 'fail');
      }
    }

    function testAutoFilter() {
      log('af-results', 'Starting Auto Filter tests...', 'info');

      try {
        const ctx = new AudioContext();
        const af = new AutoFilter(ctx);

        // Test initialization
        assert(af !== null, 'Auto Filter instance created', 'af-results');
        assert(af.baseFrequency === 1000, 'Base frequency initialized correctly', 'af-results');
        assert(af.resonance === 0, 'Resonance initialized to 0', 'af-results');
        assert(af.filterType === 'lowpass24', 'Filter type default correct', 'af-results');
        assert(af.mix === 100, 'Mix default correct', 'af-results');

        // Test filter parameters
        af.setFrequency(500);
        assert(af.baseFrequency === 500, 'Frequency set correctly', 'af-results');

        af.setResonance(75);
        assert(af.resonance === 75, 'Resonance set correctly', 'af-results');

        af.setFilterType('highpass12');
        assert(af.filterType === 'highpass12', 'Filter type set correctly', 'af-results');

        af.setMix(50);
        assert(af.mix === 50, 'Mix set correctly', 'af-results');

        // Test LFO
        af.setLFO({ rate: 2, amount: 50, waveform: 'triangle' });
        assert(af.lfoParams.rate === 2, 'LFO rate set correctly', 'af-results');
        assert(af.lfoParams.amount === 50, 'LFO amount set correctly', 'af-results');
        assert(af.lfoParams.waveform === 'triangle', 'LFO waveform set correctly', 'af-results');

        // Test tempo sync
        af.setBPM(128);
        assert(af.bpm === 128, 'BPM set correctly', 'af-results');

        af.setLFO({ sync: true, syncRate: '1/4' });
        assert(af.lfoParams.sync === true, 'Tempo sync enabled', 'af-results');
        assert(af.lfoParams.syncRate === '1/4', 'Sync rate set correctly', 'af-results');

        // Test envelope
        af.setEnvelope({
          amount: 80,
          attack: 50,
          decay: 200,
          sustain: 60,
          release: 300
        });
        assert(af.envelopeParams.amount === 80, 'Envelope amount set correctly', 'af-results');
        assert(af.envelopeParams.attack === 50, 'Envelope attack set correctly', 'af-results');
        assert(af.envelopeParams.decay === 200, 'Envelope decay set correctly', 'af-results');
        assert(af.envelopeParams.sustain === 60, 'Envelope sustain set correctly', 'af-results');
        assert(af.envelopeParams.release === 300, 'Envelope release set correctly', 'af-results');

        // Test envelope trigger
        af.triggerEnvelope();
        assert(af.envelopeActive === true, 'Envelope triggered successfully', 'af-results');

        af.releaseEnvelope();
        assert(af.envelopeActive === false, 'Envelope released successfully', 'af-results');

        // Test state retrieval
        const state = af.getState();
        assert(state.frequency === 500, 'State retrieval works', 'af-results');

        // Test audio connections
        const testSource = ctx.createOscillator();
        testSource.connect(af.getInput());
        af.connect(ctx.destination);
        assert(true, 'Audio routing works', 'af-results');

        // Cleanup
        af.destroy();
        assert(true, 'Cleanup successful', 'af-results');

        log('af-results', 'Auto Filter tests completed', 'info');
      } catch (e) {
        log('af-results', `Error: ${e.message}`, 'fail');
      }
    }

    function runAllTests() {
      clearResults();
      testEQEight();
      testEQThree();
      testAutoFilter();
      updateSummary();
    }

    // Auto-run tests on page load
    window.onload = () => {
      setTimeout(runAllTests, 500);
    };
  </script>
</body>
</html>
