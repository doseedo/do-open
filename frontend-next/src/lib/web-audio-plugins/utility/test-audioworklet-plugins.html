<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utility Plugins Test (AudioWorklet)</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      color: #4CAF50;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 10px;
    }
    h2 {
      color: #2196F3;
      margin-top: 30px;
    }
    .plugin-section {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    .control {
      margin: 15px 0;
    }
    label {
      display: inline-block;
      width: 150px;
      color: #bbb;
    }
    input[type="range"] {
      width: 300px;
      vertical-align: middle;
    }
    input[type="checkbox"] {
      margin: 0 10px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
    }
    button:hover {
      background: #45a049;
    }
    button:active {
      background: #3d8b40;
    }
    .value {
      display: inline-block;
      min-width: 80px;
      color: #4CAF50;
      font-weight: bold;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      background: #333;
      border-left: 4px solid #4CAF50;
    }
    .error {
      border-left-color: #f44336;
      background: #3a2222;
    }
  </style>
</head>
<body>
  <h1>🎛️ Utility Plugins Test (AudioWorklet Version)</h1>

  <div class="status" id="status">
    Initializing...
  </div>

  <button id="startBtn">Start Test Oscillator (440 Hz)</button>
  <button id="stopBtn" disabled>Stop</button>

  <!-- Gain Plugin -->
  <div class="plugin-section">
    <h2>1. Gain Plugin</h2>
    <div class="control">
      <label>Gain (dB):</label>
      <input type="range" id="gainDb" min="-40" max="12" step="0.1" value="0">
      <span class="value" id="gainDbValue">0.0 dB</span>
    </div>
  </div>

  <!-- Pan Plugin -->
  <div class="plugin-section">
    <h2>2. Pan Plugin</h2>
    <div class="control">
      <label>Pan:</label>
      <input type="range" id="pan" min="-1" max="1" step="0.01" value="0">
      <span class="value" id="panValue">Center</span>
    </div>
  </div>

  <!-- Polarity Plugin -->
  <div class="plugin-section">
    <h2>3. Polarity Plugin</h2>
    <div class="control">
      <label>Invert Left:</label>
      <input type="checkbox" id="invertLeft">
      <label>Invert Right:</label>
      <input type="checkbox" id="invertRight">
    </div>
  </div>

  <!-- Stereo Width Plugin -->
  <div class="plugin-section">
    <h2>4. Stereo Width Plugin</h2>
    <div class="control">
      <label>Width (%):</label>
      <input type="range" id="width" min="0" max="200" step="1" value="100">
      <span class="value" id="widthValue">100%</span>
    </div>
  </div>

  <script src="GainPlugin.js"></script>
  <script src="PanPlugin.js"></script>
  <script src="PolarityPlugin.js"></script>
  <script src="StereoWidthPlugin.js"></script>

  <script>
    // Audio context and nodes
    let audioContext;
    let oscillator;
    let plugins = {};
    let isPlaying = false;

    // Status display
    function setStatus(message, isError = false) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      if (isError) {
        statusEl.classList.add('error');
      } else {
        statusEl.classList.remove('error');
      }
    }

    // Initialize audio context and plugins
    async function initialize() {
      try {
        // Create audio context
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        setStatus('Audio context created. Creating plugins...');

        // Create plugins
        plugins.gain = new GainPlugin(audioContext, { gainDb: 0 });
        plugins.pan = new PanPlugin(audioContext, { pan: 0 });
        plugins.polarity = new PolarityPlugin(audioContext);
        plugins.width = new StereoWidthPlugin(audioContext, { width: 1.0 });

        // Wait a bit for worklets to load
        await new Promise(resolve => setTimeout(resolve, 200));

        setStatus('✓ All plugins loaded successfully!');
        console.log('Plugins initialized:', plugins);
      } catch (error) {
        setStatus('✗ Error initializing: ' + error.message, true);
        console.error('Initialization error:', error);
      }
    }

    // Start oscillator and connect plugin chain
    async function start() {
      if (isPlaying) return;

      try {
        // Resume context if suspended
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        // Create oscillator
        oscillator = audioContext.createOscillator();
        oscillator.frequency.value = 440; // A4
        oscillator.type = 'sine';

        // Connect chain: oscillator → gain → pan → width → polarity → destination
        oscillator.connect(plugins.gain.input);
        plugins.gain.connect(plugins.pan.input);
        plugins.pan.connect(plugins.width.input);
        plugins.width.connect(plugins.polarity.input);
        plugins.polarity.connect(audioContext.destination);

        // Start oscillator
        oscillator.start();
        isPlaying = true;

        // Update UI
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        setStatus('🎵 Playing test tone (440 Hz)');
      } catch (error) {
        setStatus('✗ Error starting: ' + error.message, true);
        console.error('Start error:', error);
      }
    }

    // Stop oscillator
    function stop() {
      if (!isPlaying) return;

      try {
        oscillator.stop();
        oscillator.disconnect();
        isPlaying = false;

        // Update UI
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        setStatus('⏹ Stopped');
      } catch (error) {
        setStatus('✗ Error stopping: ' + error.message, true);
        console.error('Stop error:', error);
      }
    }

    // Event listeners for controls
    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('stopBtn').addEventListener('click', stop);

    // Gain control
    document.getElementById('gainDb').addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      plugins.gain.setGainDb(value);
      document.getElementById('gainDbValue').textContent = value.toFixed(1) + ' dB';
    });

    // Pan control
    document.getElementById('pan').addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      plugins.pan.setPan(value);

      let label;
      if (value < -0.5) label = `Left ${Math.abs(value * 100).toFixed(0)}%`;
      else if (value > 0.5) label = `Right ${(value * 100).toFixed(0)}%`;
      else label = 'Center';

      document.getElementById('panValue').textContent = label;
    });

    // Polarity controls
    document.getElementById('invertLeft').addEventListener('change', (e) => {
      plugins.polarity.setInvertLeft(e.target.checked);
    });

    document.getElementById('invertRight').addEventListener('change', (e) => {
      plugins.polarity.setInvertRight(e.target.checked);
    });

    // Width control
    document.getElementById('width').addEventListener('input', (e) => {
      const value = parseInt(e.target.value);
      plugins.width.setWidthPercent(value);

      let label;
      if (value === 0) label = '0% (Mono)';
      else if (value === 100) label = '100% (Normal)';
      else label = `${value}%`;

      document.getElementById('widthValue').textContent = label;
    });

    // Initialize on load
    window.addEventListener('load', initialize);
  </script>
</body>
</html>
