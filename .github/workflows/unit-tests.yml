name: unit tests

# Fast unit tests on every push. Doesn't load model weights, doesn't hit
# Modal — just exercises pure-Python helpers (the task janitor, etc.).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/test_task_janitor.py -v
