server {
  listen 8080;

  # Staging-only banner header on every response so ops can tell at a
  # glance which environment a browser landed on.
  add_header X-Doseedo-Env "staging" always;

  # Login page — serve standalone HTML, not the React SPA
  location = /login {
    root /usr/share/nginx/html;
    try_files /login.html =404;
  }

  # Legacy URL aliases (mirror prod)
  rewrite ^/terms-of-service/?$  /terms     permanent;
  rewrite ^/contact/?$           /feedback  permanent;
  rewrite ^/login\.html$         /login     permanent;
  rewrite ^/plans\.html$         /plans     permanent;
  rewrite ^/privacy\.html$       /privacy   permanent;
  rewrite ^/terms\.html$         /terms     permanent;
  rewrite ^/about\.html$         /about     permanent;

  # Auth API → SAME prod auth-service. Staging shares the prod auth
  # service (and therefore the prod quota Redis bucket). Acceptable
  # because pre-launch staging traffic is tiny and shared quotas mean
  # staging testing doesn't let us accidentally bypass prod limits.
  # If quota cross-pollution becomes a problem, stand up
  # doseedo-auth-staging and swap these proxy_pass URLs.
  location = /token {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app/token;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s; proxy_send_timeout 30s; proxy_read_timeout 30s;
  }
  location = /token/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app/token;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s; proxy_send_timeout 30s; proxy_read_timeout 30s;
  }
  location /register/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s; proxy_send_timeout 30s; proxy_read_timeout 30s;
  }
  location /api/keys {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s; proxy_send_timeout 30s; proxy_read_timeout 30s;
  }
  location /verify-google-id-token/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s; proxy_send_timeout 30s; proxy_read_timeout 30s;
  }

  # Stemphonic / all stemphonic-server routes → STAGING Modal app.
  # Prod goes through the GCLB url-map to the prod Modal endpoint;
  # staging short-circuits that at the nginx layer so we don't need
  # to provision a second GCLB backend just for a pre-launch test
  # environment.
  location /api/generate-stemphonic    { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/separate-stemphonic    { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/encode-audio-latent    { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/encode-latents-bulk    { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/upload-latent          { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/latent                 { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/classify-instrument    { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/extract-midi           { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/detect-chords          { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/transcribe-vocals      { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/repaint-meter          { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/regen-stem-for-chord   { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/generate-score-from-video { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /api/vae-version            { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }
  location /separate-stems             { proxy_pass https://arlo--doseedo-stemphonic-staging-stemphonic-wsgi.modal.run; include /etc/nginx/conf.d/staging_modal_proxy.inc; }

  # Marketing home (same Framer site as prod — staging doesn't need a
  # separate marketing build)
  location = /home {
    proxy_pass https://heartwarming-friday-546447.framer.app/;
    proxy_set_header Host heartwarming-friday-546447.framer.app;
    proxy_ssl_server_name on;
    proxy_ssl_name heartwarming-friday-546447.framer.app;
    proxy_set_header Accept-Encoding "";
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_redirect off;
  }

  # React SPA fallback
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
