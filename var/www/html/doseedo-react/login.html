<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Doseedo</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 20px; }
    .logo { text-align: center; font-size: 1.5em; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { text-align: center; color: #555; font-size: 0.83em; margin-top: 4px; }
    input {
      width: 100%; background: #111; border: 1px solid #222; border-radius: 6px;
      color: #fff; padding: 10px 14px; font-size: 0.9em; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #444; }
    .fields { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      width: 100%; border: none; border-radius: 6px; padding: 10px;
      font-size: 0.9em; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary { background: #e8e8e8; color: #000; }
    .btn-primary:hover { background: #fff; }
    .btn-primary:disabled { background: #222; color: #555; cursor: default; }
    .btn-google {
      background: #111; color: #fff; border: 1px solid #222;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: #1a1a1a; border-color: #333; }
    .btn-google:disabled { opacity: 0.4; cursor: default; }
    .divider { display: flex; align-items: center; gap: 10px; }
    .divider-line { flex: 1; height: 1px; background: #1e1e1e; }
    .divider-text { color: #444; font-size: 0.78em; }
    .error { color: #ef4444; font-size: 0.8em; text-align: center; }
    .toggle { text-align: center; font-size: 0.8em; color: #555; }
    .toggle a { color: #888; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div>
    <div class="logo">doseedo</div>
    <div class="subtitle">Sign in to continue</div>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <button class="btn btn-google" id="googleBtn" onclick="triggerGoogle()">
    <svg width="16" height="16" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    <span id="googleLabel">Continue with Google</span>
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
  </div>

  <div class="fields">
    <input id="email" type="email" placeholder="Email" autocomplete="email" />
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="btn btn-primary" id="emailBtn" onclick="handleEmail()">Sign In</button>
  </div>

  <div class="toggle" id="toggleText">
    No account? <a onclick="toggleMode()">Create one</a>
  </div>
</div>

<!-- Hidden Google One Tap -->
<div id="g_id_onload"
  data-client_id="1028528394180-t25p4ross097jh8018sh42p8ddqgam9r.apps.googleusercontent.com"
  data-callback="handleGoogleCredential"
  data-auto_prompt="false">
</div>

<script>
  let mode = 'login'

  function showError(msg) {
    const el = document.getElementById('error')
    el.textContent = msg
    el.style.display = msg ? 'block' : 'none'
  }

  function setLoading(loading) {
    document.getElementById('emailBtn').disabled = loading
    document.getElementById('googleBtn').disabled = loading
    document.getElementById('emailBtn').textContent = loading
      ? (mode === 'login' ? 'Signing in...' : 'Creating account...')
      : (mode === 'login' ? 'Sign In' : 'Create Account')
    document.getElementById('googleLabel').textContent = loading ? 'Please wait...' : 'Continue with Google'
  }

  function toggleMode() {
    mode = mode === 'login' ? 'register' : 'login'
    document.getElementById('emailBtn').textContent = mode === 'login' ? 'Sign In' : 'Create Account'
    document.getElementById('toggleText').innerHTML = mode === 'login'
      ? 'No account? <a onclick="toggleMode()">Create one</a>'
      : 'Have an account? <a onclick="toggleMode()">Sign in</a>'
    if (mode === 'register') {
      if (!document.getElementById('username')) {
        const u = document.createElement('input')
        u.id = 'username'; u.type = 'text'; u.placeholder = 'Username'; u.autocomplete = 'username'
        document.getElementById('email').insertAdjacentElement('beforebegin', u)
      }
    } else {
      document.getElementById('username')?.remove()
    }
  }

  async function handleEmail() {
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    if (!email || !password) return showError('Email and password required')
    showError('')
    setLoading(true)
    try {
      if (mode === 'login') {
        const res = await fetch('/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ username: email, password }),
          credentials: 'include',
        })
        if (!res.ok) {
          const d = await res.json().catch(() => ({}))
          throw new Error(d.detail || 'Incorrect email or password')
        }
      } else {
        const username = document.getElementById('username')?.value.trim()
        if (!username) return showError('Username required')
        const res = await fetch('/register/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
          credentials: 'include',
        })
        if (!res.ok) {
          const d = await res.json().catch(() => ({}))
          throw new Error(d.detail || 'Registration failed')
        }
      }
      window.location.href = '/dashboard'
    } catch (err) {
      showError(err.message)
    } finally {
      setLoading(false)
    }
  }

  async function handleGoogleCredential(response) {
    showError('')
    setLoading(true)
    try {
      const res = await fetch('/verify-google-id-token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: response.credential }),
        credentials: 'include',
      })
      if (!res.ok) throw new Error('Google sign-in failed')
      window.location.href = '/dashboard'
    } catch (err) {
      showError(err.message)
      setLoading(false)
    }
  }

  function triggerGoogle() {
    if (window.google?.accounts?.id) {
      window.google.accounts.id.prompt()
    }
  }

  window.addEventListener('load', () => {
    if (window.google?.accounts?.id) {
      window.google.accounts.id.initialize({
        client_id: '1028528394180-t25p4ross097jh8018sh42p8ddqgam9r.apps.googleusercontent.com',
        callback: handleGoogleCredential,
      })
    }
  })

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleEmail()
  })
</script>
</body>
</html>
