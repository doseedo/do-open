<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utility & Analysis Tools - Complete Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      background: linear-gradient(45deg, #00ff88, #00aaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .plugin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .plugin-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .plugin-card h2 {
      margin-bottom: 15px;
      color: #00ff88;
      font-size: 1.5em;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      color: #aaaaaa;
      font-size: 0.9em;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
      border: none;
    }

    input[type="number"], select {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      font-size: 0.9em;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: linear-gradient(45deg, #00ff88, #00aaff);
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .checkbox-group input[type="checkbox"] {
      margin-right: 10px;
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    canvas {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      background: #0a0a0a;
      margin-top: 10px;
    }

    .value-display {
      display: inline-block;
      min-width: 60px;
      text-align: right;
      color: #00ff88;
      font-weight: bold;
    }

    .tuner-container {
      min-height: 250px;
    }

    .spectrum-container {
      min-height: 250px;
    }

    .audio-source {
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(0, 255, 136, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .audio-source h3 {
      margin-bottom: 10px;
      color: #00ff88;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .info-box {
      background: rgba(0, 170, 255, 0.1);
      border: 1px solid rgba(0, 170, 255, 0.3);
      border-radius: 5px;
      padding: 10px;
      margin-top: 10px;
      font-size: 0.85em;
      color: #aaaaaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Utility & Analysis Tools</h1>

    <!-- Audio Source -->
    <div class="audio-source">
      <h3>Audio Source</h3>
      <div class="button-group">
        <button onclick="startOscillator()">Play Test Tone (440 Hz)</button>
        <button onclick="stopOscillator()">Stop Tone</button>
        <button onclick="startMicrophone()">Use Microphone</button>
        <button onclick="stopMicrophone()">Stop Microphone</button>
        <button onclick="loadAudioFile()">Load Audio File</button>
      </div>
      <input type="file" id="audioFileInput" accept="audio/*" style="display: none;" onchange="handleAudioFile(event)">
      <div class="info-box">
        Status: <span id="audioStatus">No audio source</span>
      </div>
    </div>

    <div class="plugin-grid">
      <!-- Utility Plugin -->
      <div class="plugin-card">
        <h2>Utility</h2>

        <div class="control-group">
          <label>Gain: <span class="value-display" id="gainValue">0 dB</span></label>
          <input type="range" id="gainSlider" min="-60" max="35" value="0" step="0.1">
        </div>

        <div class="control-group">
          <label>Width: <span class="value-display" id="widthValue">100%</span></label>
          <input type="range" id="widthSlider" min="0" max="200" value="100" step="1">
        </div>

        <div class="control-group">
          <label>Balance: <span class="value-display" id="balanceValue">0</span></label>
          <input type="range" id="balanceSlider" min="-100" max="100" value="0" step="1">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="phaseLCheck">
          <label for="phaseLCheck">Invert Phase L</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="phaseRCheck">
          <label for="phaseRCheck">Invert Phase R</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="monoCheck">
          <label for="monoCheck">Mono</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="swapCheck">
          <label for="swapCheck">Swap L/R</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="dcFilterCheck">
          <label for="dcFilterCheck">DC Filter</label>
        </div>
      </div>

      <!-- Spectrum Analyzer -->
      <div class="plugin-card spectrum-container">
        <h2>Spectrum Analyzer</h2>

        <div class="control-group">
          <label>FFT Size</label>
          <select id="fftSizeSelect">
            <option value="512">512</option>
            <option value="1024">1024</option>
            <option value="2048" selected>2048</option>
            <option value="4096">4096</option>
            <option value="8192">8192</option>
          </select>
        </div>

        <div class="control-group">
          <label>Smoothing: <span class="value-display" id="smoothingValue">80%</span></label>
          <input type="range" id="smoothingSlider" min="0" max="100" value="80" step="1">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="peakHoldCheck">
          <label for="peakHoldCheck">Peak Hold</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="freezeCheck">
          <label for="freezeCheck">Freeze</label>
        </div>

        <canvas id="spectrumCanvas" width="800" height="400"></canvas>
      </div>

      <!-- Tuner -->
      <div class="plugin-card tuner-container">
        <h2>Tuner</h2>

        <div class="control-group">
          <label>Reference Frequency (A4)</label>
          <input type="number" id="refFreqInput" min="400" max="480" value="440" step="1">
        </div>

        <div id="tunerDisplay"></div>

        <div class="info-box">
          Play a note on your instrument or sing to see the tuner in action.
        </div>
      </div>

      <!-- Channel EQ -->
      <div class="plugin-card">
        <h2>Channel EQ</h2>

        <div class="control-group">
          <label>Low Cut Frequency: <span class="value-display" id="lowCutValue">Off</span></label>
          <input type="range" id="lowCutSlider" min="0" max="500" value="0" step="5">
        </div>

        <div class="control-group">
          <label>Low Cut Slope</label>
          <select id="lowCutSlopeSelect">
            <option value="6">6 dB/oct</option>
            <option value="12" selected>12 dB/oct</option>
            <option value="18">18 dB/oct</option>
            <option value="24">24 dB/oct</option>
            <option value="36">36 dB/oct</option>
            <option value="48">48 dB/oct</option>
          </select>
        </div>

        <div class="control-group">
          <label>High Cut Frequency: <span class="value-display" id="highCutValue">Off</span></label>
          <input type="range" id="highCutSlider" min="0" max="20000" value="0" step="100">
        </div>

        <div class="control-group">
          <label>High Cut Slope</label>
          <select id="highCutSlopeSelect">
            <option value="6">6 dB/oct</option>
            <option value="12" selected>12 dB/oct</option>
            <option value="18">18 dB/oct</option>
            <option value="24">24 dB/oct</option>
            <option value="36">36 dB/oct</option>
            <option value="48">48 dB/oct</option>
          </select>
        </div>

        <div class="info-box">
          Low cut removes rumble and low-end noise. High cut removes harshness and high-frequency noise.
        </div>
      </div>
    </div>
  </div>

  <!-- Load plugins -->
  <script src="../utility/Utility.js"></script>
  <script src="../utility/SpectrumAnalyzer.js"></script>
  <script src="../utility/Tuner.js"></script>
  <script src="../utility/ChannelEQ.js"></script>

  <script>
    // Audio context and nodes
    let audioContext;
    let sourceNode;
    let oscillator;
    let microphoneStream;
    let audioElement;

    // Plugins
    let utility;
    let spectrumAnalyzer;
    let tuner;
    let channelEQ;

    // Initialize audio context and plugins
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Create plugins
        utility = new Utility(audioContext);
        spectrumAnalyzer = new SpectrumAnalyzer(
          audioContext,
          document.getElementById('spectrumCanvas')
        );
        tuner = new Tuner(
          audioContext,
          document.getElementById('tunerDisplay')
        );
        channelEQ = new ChannelEQ(audioContext);

        // Chain plugins: source → utility → channelEQ → analyzer/tuner → destination
        // We'll connect the source later
        utility.connect(channelEQ.input);
        channelEQ.connect(spectrumAnalyzer.input);
        channelEQ.connect(tuner.input);
        spectrumAnalyzer.connect(audioContext.destination);
        tuner.connect(audioContext.destination);

        setupControls();
      }
    }

    // Start oscillator (test tone)
    function startOscillator() {
      initAudio();
      stopAllSources();

      oscillator = audioContext.createOscillator();
      oscillator.frequency.value = 440; // A4
      oscillator.type = 'sine';

      oscillator.connect(utility.input);
      oscillator.start();

      document.getElementById('audioStatus').textContent = 'Playing test tone (440 Hz)';
    }

    function stopOscillator() {
      if (oscillator) {
        oscillator.stop();
        oscillator = null;
      }
      document.getElementById('audioStatus').textContent = 'No audio source';
    }

    // Start microphone
    async function startMicrophone() {
      initAudio();
      stopAllSources();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphoneStream = stream;

        sourceNode = audioContext.createMediaStreamSource(stream);
        sourceNode.connect(utility.input);

        document.getElementById('audioStatus').textContent = 'Using microphone';
      } catch (error) {
        console.error('Error accessing microphone:', error);
        alert('Could not access microphone. Please check permissions.');
      }
    }

    function stopMicrophone() {
      if (microphoneStream) {
        microphoneStream.getTracks().forEach(track => track.stop());
        microphoneStream = null;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }
      document.getElementById('audioStatus').textContent = 'No audio source';
    }

    // Load audio file
    function loadAudioFile() {
      document.getElementById('audioFileInput').click();
    }

    async function handleAudioFile(event) {
      initAudio();
      stopAllSources();

      const file = event.target.files[0];
      if (!file) return;

      const arrayBuffer = await file.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      audioElement = audioContext.createBufferSource();
      audioElement.buffer = audioBuffer;
      audioElement.loop = true;
      audioElement.connect(utility.input);
      audioElement.start();

      document.getElementById('audioStatus').textContent = `Playing: ${file.name}`;
    }

    // Stop all sources
    function stopAllSources() {
      stopOscillator();
      stopMicrophone();
      if (audioElement) {
        audioElement.stop();
        audioElement = null;
      }
    }

    // Setup controls
    function setupControls() {
      // Utility controls
      document.getElementById('gainSlider').addEventListener('input', (e) => {
        const value = parseFloat(e.target.value);
        utility.setGain(value);
        document.getElementById('gainValue').textContent = `${value.toFixed(1)} dB`;
      });

      document.getElementById('widthSlider').addEventListener('input', (e) => {
        const value = parseInt(e.target.value);
        utility.setWidth(value);
        document.getElementById('widthValue').textContent = `${value}%`;
      });

      document.getElementById('balanceSlider').addEventListener('input', (e) => {
        const value = parseInt(e.target.value);
        utility.setBalance(value);
        document.getElementById('balanceValue').textContent = value;
      });

      document.getElementById('phaseLCheck').addEventListener('change', (e) => {
        utility.setPhase('L', e.target.checked);
      });

      document.getElementById('phaseRCheck').addEventListener('change', (e) => {
        utility.setPhase('R', e.target.checked);
      });

      document.getElementById('monoCheck').addEventListener('change', (e) => {
        utility.setMono(e.target.checked);
      });

      document.getElementById('swapCheck').addEventListener('change', (e) => {
        utility.setSwap(e.target.checked);
      });

      document.getElementById('dcFilterCheck').addEventListener('change', (e) => {
        utility.setDCFilter(e.target.checked);
      });

      // Spectrum Analyzer controls
      document.getElementById('fftSizeSelect').addEventListener('change', (e) => {
        spectrumAnalyzer.setFFTSize(parseInt(e.target.value));
      });

      document.getElementById('smoothingSlider').addEventListener('input', (e) => {
        const value = parseInt(e.target.value);
        spectrumAnalyzer.setSmoothing(value);
        document.getElementById('smoothingValue').textContent = `${value}%`;
      });

      document.getElementById('peakHoldCheck').addEventListener('change', (e) => {
        spectrumAnalyzer.setPeakHold(e.target.checked);
      });

      document.getElementById('freezeCheck').addEventListener('change', (e) => {
        spectrumAnalyzer.setFreeze(e.target.checked);
      });

      // Tuner controls
      document.getElementById('refFreqInput').addEventListener('input', (e) => {
        tuner.setReferenceFreq(parseInt(e.target.value));
      });

      // Channel EQ controls
      document.getElementById('lowCutSlider').addEventListener('input', (e) => {
        const value = parseInt(e.target.value);
        const slope = parseInt(document.getElementById('lowCutSlopeSelect').value);

        if (value === 0) {
          channelEQ.setLowCut(0, slope);
          document.getElementById('lowCutValue').textContent = 'Off';
        } else {
          channelEQ.setLowCut(value, slope);
          document.getElementById('lowCutValue').textContent = `${value} Hz`;
        }
      });

      document.getElementById('lowCutSlopeSelect').addEventListener('change', (e) => {
        const freq = parseInt(document.getElementById('lowCutSlider').value);
        const slope = parseInt(e.target.value);
        if (freq > 0) {
          channelEQ.setLowCut(freq, slope);
        }
      });

      document.getElementById('highCutSlider').addEventListener('input', (e) => {
        const value = parseInt(e.target.value);
        const slope = parseInt(document.getElementById('highCutSlopeSelect').value);

        if (value === 0) {
          channelEQ.setHighCut(0, slope);
          document.getElementById('highCutValue').textContent = 'Off';
        } else {
          channelEQ.setHighCut(value, slope);
          document.getElementById('highCutValue').textContent = `${value} Hz`;
        }
      });

      document.getElementById('highCutSlopeSelect').addEventListener('change', (e) => {
        const freq = parseInt(document.getElementById('highCutSlider').value);
        const slope = parseInt(e.target.value);
        if (freq > 0) {
          channelEQ.setHighCut(freq, slope);
        }
      });
    }

    // Auto-resize canvas
    window.addEventListener('resize', () => {
      const canvas = document.getElementById('spectrumCanvas');
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * 2; // Retina display
      canvas.height = rect.height * 2;
    });

    // Initial canvas size
    window.dispatchEvent(new Event('resize'));
  </script>
</body>
</html>
