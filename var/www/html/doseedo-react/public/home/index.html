<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doseedo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://do.doseedo.com/">
  <!--
    Static redirect stub: /home on doseedo.com must serve the Framer marketing
    site (do.doseedo.com), not the React SPA. This file is copied from
    public/home/index.html into build/home/index.html by CRA on every build,
    so `gsutil -m rsync -r -c -d build/ gs://doseedo-frontend-static/` in
    do2/deploy_studio.sh preserves it across deploys. If you remove this file,
    the bucket's notFoundPage=index.html fallback will serve the SPA at /home
    and the in-app <Home /> landing will render instead of Framer.
  -->
  <meta http-equiv="refresh" content="0; url=https://do.doseedo.com/">
  <script>window.location.replace('https://do.doseedo.com/');</script>
</head>
<body>
  <p>Redirecting to <a href="https://do.doseedo.com/">do.doseedo.com</a>&hellip;</p>
</body>
</html>
