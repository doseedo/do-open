server {
  listen 8080;

  # Login page — serve standalone HTML, not the React SPA
  location = /login {
    root /usr/share/nginx/html;
    try_files /login.html =404;
  }

  # Auth API routes → Cloud Run auth service
  location = /token {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app/token;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location = /token/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app/token;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /register/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /api/keys {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /verify-google-id-token/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # React SPA fallback
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
