server {
  listen 8080;

  # Login page — serve standalone HTML, not the React SPA
  location = /login {
    root /usr/share/nginx/html;
    try_files /login.html =404;
  }

  # Legacy URL aliases — the Framer marketing site still ships links like
  # /terms-of-service, /contact, /login.html, /plans.html. Rewrite them to
  # their canonical SPA routes so users don't hit broken pages. Drop these
  # once the Framer project itself is updated.
  rewrite ^/terms-of-service/?$  /terms     permanent;
  rewrite ^/contact/?$           /feedback  permanent;
  rewrite ^/login\.html$         /login     permanent;
  rewrite ^/plans\.html$         /plans     permanent;
  rewrite ^/privacy\.html$       /privacy   permanent;
  rewrite ^/terms\.html$         /terms     permanent;
  rewrite ^/about\.html$         /about     permanent;

  # Auth API routes → Cloud Run auth service
  location = /token {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app/token;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location = /token/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app/token;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /register/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /api/keys {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /verify-google-id-token/ {
    proxy_pass https://doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header Host doseedo-auth-wd7h2yezlq-uc.a.run.app;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Marketing home — proxy the Framer site transparently so the browser
  # never leaves doseedo.com. Routed here from the bassify URL map (see
  # pathRule /home → frontend-cloudrun-backend). The React SPA should
  # redirect unauthenticated visitors from / to /home via the inline
  # cookie gate in public/index.html; this location block is what makes
  # that redirect visually seamless (no trip to do.doseedo.com).
  location = /home {
    proxy_pass https://heartwarming-friday-546447.framer.app/;
    proxy_set_header Host heartwarming-friday-546447.framer.app;
    proxy_ssl_server_name on;
    proxy_ssl_name heartwarming-friday-546447.framer.app;
    proxy_set_header Accept-Encoding "";
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_redirect off;
  }

  # React SPA fallback
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
