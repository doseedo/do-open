        <script>
let mus = false
let isAuthenticated = false

 function music(){
    console.log(mus)
    mus = true
    console.log(mus)
 }
 function uploadVideo() {
            const videoPreview = document.getElementById('videoPreview');

            // Check if a video is already uploaded
            if (videoPreview.src) {
                generateAudio(); // If video already uploaded, call generateAudio
                return;
            }

            const videoInput = document.getElementById('videoFile');
            if (videoInput.files.length === 0) {
                alert('Please select a video file.');
                return;
            }

            const formData = new FormData();
            formData.append('file', videoInput.files[0]);

            fetch('https://bassify.net/uploadvideo/', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('description-input').value = data.labels.join(', ');
                generateAudio(); // Proceed to generate audio after upload
                videoPreview.src = URL.createObjectURL(videoInput.files[0]); // Set video preview
            })
            .catch(error => console.error('Error:', error));
        }

        function generateAudio() {
            const descriptionInput = document.getElementById('description-input');
            const durationInput = document.getElementById('duration-input');
            const labels = descriptionInput.value.split(', ');
            const promptSelect = document.getElementById('prompt-select');
            const prompt = promptSelect.value;
            const duration = durationInput.value;

            const formData = new FormData();
            formData.append('labels', JSON.stringify(labels));
            formData.append('prompt', prompt);
            formData.append('duration', duration);
            formData.append('video_output', descriptionInput.value);
            formData.append('request_type', 'normal');

            fetch('https://bassify.net/generate', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data && data.task_id) {
                    pollTaskStatus(data.task_id, createDownloadLinks);
                } else {
                    console.log('No task ID received');
                }
            })
            .catch(error => {
                console.error('There was a problem with the fetch operation:', error);
            });
        }

function pollTaskStatus(taskId, callback) {
    fetch(`https://bassify.net/task/${taskId}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === 'completed') {
                callback(data.result); // Call the callback with the result
            } else {
                setTimeout(() => pollTaskStatus(taskId, callback), 2000); // Poll again after a delay
            }
        })
        .catch(error => console.error('Error polling task status:', error));
}

function createDownloadLinks(filePaths) {
    const downloadList = document.getElementById('download-links');
    downloadList.innerHTML = "";

    filePaths.forEach(filePath => {
        const linkElement = document.createElement("a");
        linkElement.href = `https://bassify.net${filePath}`;
        linkElement.innerText = 'Download Audio';
        linkElement.target = '_blank';

        const listItem = document.createElement("li");
        listItem.appendChild(document.createTextNode('Download ')); // Replace with an icon if desired
        listItem.appendChild(linkElement);
        downloadList.appendChild(listItem);
    });
}

        function generateAudioWithMelody() {
        const descriptionInput = document.getElementById('description-input');
        const durationInput = document.getElementById('duration-input'); // Input for duration
            
        const melodyInput = document.getElementById('melodyInput');
        const melodyFile = melodyInput.files[0];
        const labels = descriptionInput.value.split(', ');
        const duration = durationInput.value; // Get the specified duration
        const promptSelect = document.getElementById('prompt-select'); // Dropdown or input for selecting prompt
        const prompt = promptSelect.value; // Get the selected prompt
            
        const formData = new FormData();

        formData.append('labels', JSON.stringify(labels));
        formData.append('prompt', prompt); // Send the selected prompt
        formData.append('duration', duration); // Send the duration
        formData.append('video_output', descriptionInput.value); // Send labels as video_output
        formData.append('request_type', 'melody');
        formData.append('melody', melodyFile);

        fetch('https://bassify.net/generateMelody', { // Adjust the endpoint if needed
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
                      if (data && data.length) {
                          const downloadList = document.getElementById('download-links');
                          downloadList.innerHTML = "";

      
                          data.forEach(filePath => {
                              const linkElement = document.createElement("a");
                              linkElement.href = 'https://bassify.net/download/' + filePath; // Adjusted base URL for download links
                              linkElement.innerText = 'Download Audio';
                              linkElement.target = '_blank'; // Open in a new tab
      
                              const listItem = document.createElement("li");
                              listItem.appendChild(document.createElement('<i class="fa-solid fa-download"></i>'))
                             
                              listItem.appendChild(linkElement);
                              downloadList.appendChild(listItem);
                          });
                      } else {
                          console.log('No download links available');
                      }
                  })
        .catch(error => {
            console.error('There was a problem with the fetch operation:', error);
        });
    }

function signOut() {

function toggleSignOutButton() {

        document.getElementById('loginbutton').style.display = 'block';

  }
