  <div>
    <img style="width: 100px;" src="logomusic.png" alt="">
    <h2 >Forgot your password?</h2>
    <h4 >Enter your account email.</h4>

    <form id="resetRequestForm">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit">Request Password Reset</button>
    </form>

</div>

    <script>
        document.getElementById('resetRequestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;

            const response = await fetch('https://doseedo.com/password-reset-request/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `email=${encodeURIComponent(email)}`
            });

            const result = await response.json();
            alert(result.message);
        });
    </script>

  </div>
