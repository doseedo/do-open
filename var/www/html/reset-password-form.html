<div id="register-form">
  <div>
    <h2>Reset your password</h2>
    <form id="resetForm" method="post" action="https://doseedo.com/reset-password/">

      <input type="hidden" name="token" value="" id="token">

      <input type="password" name="new_password" id="new_password" placeholder="New Password" required>
      <input type="password" id="confirm_password" placeholder="Confirm Password" required>

      <button  type="button" id="togglePassword" style="margin: 10px 0; background: none;">Show</button>

      <button type="submit">Reset Password</button>
    </form>

<script>
  // Set token from URL
  document.getElementById('token').value = new URLSearchParams(window.location.search).get('token');

  // Toggle password visibility
  document.getElementById('togglePassword').addEventListener('click', function () {
    const pw = document.getElementById('new_password');
    const cpw = document.getElementById('confirm_password');
    const type = pw.type === 'password' ? 'text' : 'password';

    pw.type = type;
    cpw.type = type;
    this.textContent = type === 'text' ? 'Hide' : 'Show';
  });

  // Handle form submission with fetch
  document.getElementById('resetForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const token = document.getElementById('token').value;
    const pw = document.getElementById('new_password').value;
    const cpw = document.getElementById('confirm_password').value;

    if (pw !== cpw) {
      alert('Passwords do not match.');
      return;
    }

    try {
      const response = await fetch('https://doseedo.com/reset-password/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: `token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(pw)}`
      });

      const result = await response.json();

      if (response.ok) {
        alert(result.message);
        window.location.href = 'login.html';
      } else {
        alert(result.detail || 'Something went wrong.');
      }
    } catch (err) {
      alert('Error: ' + err.message);
    }
  });
</script>
