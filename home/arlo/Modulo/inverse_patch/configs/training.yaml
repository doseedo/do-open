# Training Configuration for Inverse Audio Effects System

training:
  batch_size: 16
  num_workers: 8
  learning_rate: 1e-4
  weight_decay: 1e-5
  max_epochs: 100
  gradient_clip_val: 1.0

  optimizer: "adamw"
  scheduler:
    type: "cosine"
    warmup_epochs: 5
    min_lr: 1e-6

losses:
  audio_reconstruction:
    type: "multi_resolution_stft"
    weight: 1.0
    fft_sizes: [512, 1024, 2048]
    hop_sizes: [128, 256, 512]
    win_lengths: [512, 1024, 2048]

  classification:
    type: "bce_with_logits"
    weight: 1.0

  parameter_regression:
    type: "mse"
    weight: 0.5

  contrastive:
    type: "simclr"
    weight: 0.1
    temperature: 0.07

  cycle_consistency:
    weight: 0.5

curriculum:
  stages:
    - max_chain_length: 1
      effect_types: ["eq"]
      epochs: 10

    - max_chain_length: 2
      effect_types: ["eq", "compressor"]
      epochs: 15

    - max_chain_length: 3
      effect_types: ["eq", "compressor", "reverb"]
      epochs: 20

    - max_chain_length: 4
      effect_types: ["eq", "compressor", "reverb", "distortion", "chorus", "delay"]
      epochs: 30

checkpointing:
  save_top_k: 3
  monitor: "val/total_loss"
  mode: "min"
  save_last: true

logging:
  log_every_n_steps: 50
  val_check_interval: 0.5
