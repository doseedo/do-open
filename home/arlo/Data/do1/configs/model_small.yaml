# DO1 Small Model Configuration (for debugging/testing)
# Target: ~50M parameters

# Input/output dimensions
in_channels_noisy: 8
in_channels_cond: 8
in_channels_mask: 1
in_channels_ref: 8
out_channels: 8

# Patch embedding
patch_size: [4, 4]
freq_bins: 16
max_time_frames: 4096

# Transformer dimensions (small for testing)
model_dim: 512
num_attention_heads: 8
attention_head_dim: 64
num_layers: 4
mlp_ratio: 4.0

# Position encoding
max_position: 8192
rope_theta: 1000000.0

# Normalization
qk_norm: true
