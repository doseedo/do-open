<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Plugins - Verification Test</title>
    <style>
        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00ffff;
            border-bottom: 2px solid #00ffff;
            padding-bottom: 10px;
        }
        .test-section {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .success {
            color: #00ff00;
        }
        .error {
            color: #ff0000;
        }
        .warning {
            color: #ffaa00;
        }
        .plugin-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .plugin-item {
            background: #333;
            padding: 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        .plugin-item.success {
            border-left: 3px solid #00ff00;
        }
        .plugin-item.error {
            border-left: 3px solid #ff0000;
        }
        .stats {
            background: #2a2a2a;
            border: 2px solid #00ffff;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-item {
            background: #333;
            padding: 15px;
            border-radius: 3px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
        }
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        button {
            background: #00ffff;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            margin: 5px;
        }
        button:hover {
            background: #00cccc;
        }
        #console {
            background: #000;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-size: 12px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🎵 Web Audio Plugins - Verification Test</h1>

    <div class="stats">
        <h2>Library Statistics</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="total-plugins">-</div>
                <div class="stat-label">Total Plugins</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="registered-plugins">-</div>
                <div class="stat-label">Registered</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="categories">-</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="test-results">-</div>
                <div class="stat-label">Tests Passed</div>
            </div>
        </div>
    </div>

    <div class="test-section">
        <h2>Test Controls</h2>
        <button onclick="runTests()">▶ Run All Tests</button>
        <button onclick="testPluginCreation()">🔧 Test Plugin Creation</button>
        <button onclick="testPluginChain()">🔗 Test Plugin Chain</button>
        <button onclick="clearConsole()">🗑️ Clear Console</button>
    </div>

    <div class="test-section">
        <h2>Registered Plugins</h2>
        <div id="plugin-list" class="plugin-list"></div>
    </div>

    <div class="test-section">
        <h2>Console Output</h2>
        <div id="console"></div>
    </div>

    <script type="module">
        import { registerAllPlugins } from './register-all.js';
        import PluginFactory from './core/PluginFactory.js';
        import Router from './core/Router.js';
        import { LIBRARY_INFO } from './index.js';

        let audioContext;
        const consoleElement = document.getElementById('console');

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            const line = `[${timestamp}] ${prefix} ${message}\n`;
            consoleElement.textContent += line;
            consoleElement.scrollTop = consoleElement.scrollHeight;

            if (type === 'error') {
                console.error(message);
            } else {
                console.log(message);
            }
        }

        function updateStats() {
            const stats = PluginFactory.getStats();
            document.getElementById('total-plugins').textContent = LIBRARY_INFO.totalPlugins;
            document.getElementById('registered-plugins').textContent = PluginFactory.getRegisteredTypes().length;
            document.getElementById('categories').textContent = Object.keys(stats.byCategory).length;
        }

        function displayPlugins() {
            const plugins = PluginFactory.getRegisteredTypes();
            const listElement = document.getElementById('plugin-list');

            listElement.innerHTML = plugins.map(name => {
                const metadata = PluginFactory.getMetadata(name);
                return `
                    <div class="plugin-item success">
                        <strong>${name}</strong><br>
                        <small>${metadata.category} • ${metadata.description}</small>
                    </div>
                `;
            }).join('');
        }

        window.clearConsole = () => {
            consoleElement.textContent = '';
        };

        window.testPluginCreation = async () => {
            log('=== Testing Plugin Creation ===');

            if (!audioContext) {
                audioContext = new AudioContext();
                log('Created AudioContext');
            }

            const plugins = PluginFactory.getRegisteredTypes();
            let successCount = 0;
            let failCount = 0;

            for (const pluginType of plugins) {
                try {
                    const plugin = PluginFactory.create(pluginType, audioContext);
                    if (plugin) {
                        successCount++;
                        log(`✓ ${pluginType} created successfully`, 'success');
                        plugin.dispose();
                    } else {
                        failCount++;
                        log(`✗ ${pluginType} failed to create`, 'error');
                    }
                } catch (error) {
                    failCount++;
                    log(`✗ ${pluginType} error: ${error.message}`, 'error');
                }
            }

            log(`\nResults: ${successCount} passed, ${failCount} failed`, failCount > 0 ? 'warning' : 'success');
            document.getElementById('test-results').textContent = `${successCount}/${plugins.length}`;
        };

        window.testPluginChain = async () => {
            log('=== Testing Plugin Chain ===');

            if (!audioContext) {
                audioContext = new AudioContext();
                log('Created AudioContext');
            }

            try {
                const router = new Router(audioContext);
                log('✓ Router created');

                // Create a chain: Compressor → EQ → Reverb
                const compressor = PluginFactory.create('Compressor', audioContext);
                const eq = PluginFactory.create('EQEight', audioContext);
                const reverb = PluginFactory.create('Reverb', audioContext);

                router.addPlugin(compressor, 'comp');
                router.addPlugin(eq, 'eq');
                router.addPlugin(reverb, 'reverb');
                log('✓ Added 3 plugins to router');

                router.connect('comp', 'eq');
                router.connect('eq', 'reverb');
                log('✓ Connected plugin chain');

                reverb.connect(audioContext.destination);
                log('✓ Connected to destination');

                // Test parameter setting
                compressor.setParameter('threshold', -20);
                eq.setParameter('band0_gain', 3);
                reverb.setParameter('decay', 2.5);
                log('✓ Set parameters on all plugins');

                // Test preset save/load
                const preset = compressor.savePreset('Test Preset');
                compressor.loadPreset(preset);
                log('✓ Preset save/load working');

                log('\nPlugin Chain Test: SUCCESS', 'success');

                // Cleanup
                compressor.dispose();
                eq.dispose();
                reverb.dispose();

            } catch (error) {
                log(`Plugin Chain Test: FAILED - ${error.message}`, 'error');
            }
        };

        window.runTests = async () => {
            clearConsole();
            log('Starting comprehensive test suite...\n');

            await testPluginCreation();
            log('\n');
            await testPluginChain();

            log('\n=== All Tests Complete ===', 'success');
        };

        // Initialize on load
        window.addEventListener('load', () => {
            log('Registering all plugins...');
            const stats = registerAllPlugins();
            log(`Registered ${stats.totalRegistered} plugins`, 'success');

            updateStats();
            displayPlugins();

            log('\nReady to test! Click "Run All Tests" to begin.');
        });
    </script>
</body>
</html>
