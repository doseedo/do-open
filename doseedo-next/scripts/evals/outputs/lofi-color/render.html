<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VHS-88 — ref-renderer preview</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0908; color: #d9d4cd;
      font-family: system-ui, sans-serif; min-height: 100vh; }
    #root { display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px; box-sizing: border-box; }
    /* Ref-renderer stylesheet. All color / font tokens come from CSS custom
 * properties set inline on .rr-shell by renderDSL.js. This file defines
 * only layout + structural styling — never hardcoded colors. Intentional
 * exception: fallback grey/black values so the editor doesn't blow up
 * when a token is missing.
 */

/* reset within the shell only */
.rr-shell, .rr-shell * { box-sizing: border-box; }

.rr-shell {
  display: flex;
  flex-direction: column;
  background: var(--bg-0, #0f0e0d);
  color: var(--ink, #d9d4cd);
  border: 1px solid var(--line, #3a3632);
  border-radius: 8px;
  box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6),
              inset 0 0 0 1px var(--bg-3, #2a2724);
  overflow: hidden;
  font-feature-settings: "tnum";
  font-size: 12px;
  position: relative;
}

/* ────────────────────────────────────────────────────────────── */
/* Header                                                          */

.rr-header {
  display: flex;
  align-items: center;
  height: 56px;
  padding: 0 12px;
  gap: 12px;
  background: var(--bg-1, #1a1816);
  border-bottom: 1px solid var(--line, #3a3632);
  flex-shrink: 0;
}
.rr-brand { display: flex; align-items: center; gap: 10px; }
.rr-brand__logo {
  width: 30px; height: 30px; border-radius: 4px;
  background: var(--accent, oklch(0.78 0.15 70));
  color: var(--bg-0, #0f0e0d);
  font-family: var(--font-brand, serif);
  font-weight: 700;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
}
.rr-brand__name {
  font-family: var(--font-brand, serif);
  font-weight: 600;
  letter-spacing: 0.1em;
  font-size: 16px;
  color: var(--ink, #d9d4cd);
}
.rr-brand__sub {
  font-family: var(--font-mono, monospace);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--ink-dim, #9a958e);
  text-transform: uppercase;
}

.rr-tabs { display: flex; gap: 4px; margin-left: 12px; }
.rr-tab {
  padding: 4px 10px;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-dim, #9a958e);
  border: 1px solid transparent;
  border-radius: 3px;
  background: var(--bg-2, #241f1b);
}
.rr-tab.is-active {
  color: var(--accent, oklch(0.78 0.15 70));
  border-color: var(--accent-deep, #5a4628);
  background: var(--bg-3, #2a2724);
}

.rr-patchbar {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 10px;
  background: var(--bg-2, #241f1b);
  border-radius: 3px;
  margin-left: auto;
  border: 1px solid var(--line, #3a3632);
}
.rr-patchbar__name {
  font-family: var(--font-mono, monospace);
  font-size: 10px;
  color: var(--accent, oklch(0.78 0.15 70));
}
.rr-patchbar__meta { display: flex; gap: 4px; font-size: 9px; }
.rr-k { color: var(--ink-faint, #6a665f); }
.rr-v { color: var(--ink-dim, #9a958e); }

/* ────────────────────────────────────────────────────────────── */
/* Body + rows                                                     */

.rr-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px;
  min-height: 0;
  overflow: hidden;
}
.rr-row {
  display: flex;
  gap: 4px;
  min-height: 0;
}
.rr-row--modules   { background: var(--bg-1, #1a1816); }
.rr-row--modmatrix { background: var(--bg-1, #1a1816); }
.rr-row--keyboard  { background: var(--bg-0, #0f0e0d); padding: 0; }
.rr-row--buttons {
  background: var(--bg-1, #1a1816);
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 1fr;
  padding: 10px;
  gap: 10px;
}
.rr-row--sliders {
  background: var(--bg-1, #1a1816);
  padding: 10px;
  flex-direction: column;
  gap: 4px;
}
.rr-row--led {
  background: var(--bg-1, #1a1816);
  flex-direction: column;
  padding: 10px;
}
.rr-row--unknown {
  color: var(--warn, #d07a68);
  font-family: var(--font-mono, monospace);
  font-size: 11px;
  align-items: center;
  justify-content: center;
}

/* ────────────────────────────────────────────────────────────── */
/* Module chassis                                                  */

.rr-mod {
  display: flex;
  flex-direction: column;
  background: var(--bg-1, #1a1816);
  border: 1px solid var(--line, #3a3632);
  border-radius: 5px;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}
.rr-mod--panel { flex: 1; }
.rr-mod--unknown {
  color: var(--warn, #d07a68);
  font-family: var(--font-mono, monospace);
  padding: 4px;
  font-size: 10px;
}

.rr-mod__head {
  display: flex; align-items: center; gap: 6px;
  height: 22px; padding: 0 8px;
  background: var(--bg-2, #241f1b);
  border-bottom: 1px solid var(--line, #3a3632);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-dim, #9a958e);
  font-weight: 600;
}
.rr-mod__head.is-active {
  background: color-mix(in oklab, var(--accent, #d8a860) 10%, var(--bg-2, #241f1b));
  border-bottom-color: var(--accent-deep, #5a4628);
  color: var(--accent, oklch(0.78 0.15 70));
}
.rr-mod__label { color: inherit; }
.rr-mod__mini-label {
  font-size: 8px;
  color: var(--ink-faint, #6a665f);
  border: 1px solid var(--line, #3a3632);
  padding: 0 3px;
  border-radius: 2px;
}
.rr-mod__panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-dim, #9a958e);
  background: var(--bg-2, #241f1b);
  border-bottom: 1px solid var(--line, #3a3632);
}

.rr-mod__body {
  display: flex;
  flex-direction: column;
  padding: 4px;
  gap: 4px;
  flex: 1;
  min-height: 0;
}
.rr-mod__panel-body {
  display: flex;
  flex-direction: column;
  padding: 6px;
  gap: 6px;
  flex: 1;
  min-height: 0;
}
.rr-mod__spacer { flex: 1; }

.rr-mod__sub-head {
  display: flex; align-items: center; gap: 4px;
  height: 20px;
  padding: 0 6px;
  background: var(--bg-2, #241f1b);
  border-radius: 3px;
  font-size: 10px;
}
.rr-mod__sub-head.rr-center { justify-content: center; }
.rr-mod__table-name { color: var(--ink, #d9d4cd); font-weight: 500; font-size: 11px; }

.rr-mod__meta-row {
  display: flex; justify-content: space-around;
  padding: 4px 0;
  border-bottom: 1px solid var(--line-soft, #2a2724);
}
.rr-mod__meta {
  display: flex; flex-direction: column; align-items: center;
  font-size: 8.5px;
  color: var(--ink-faint, #6a665f);
}
.rr-mod__meta .rr-value {
  font-family: var(--font-mono, monospace);
  color: var(--ink-dim, #9a958e);
}
.rr-mod__meta-col {
  display: flex; flex-direction: column; gap: 3px;
  padding: 4px;
  border-bottom: 1px solid var(--line-soft, #2a2724);
}
.rr-mod__metarow {
  display: flex; justify-content: space-between;
  font-size: 9px;
}
.rr-label { color: var(--ink-faint, #6a665f); font-size: 9px; letter-spacing: 0.08em; }
.rr-readout { color: var(--ink-dim, #9a958e); font-family: var(--font-mono, monospace); font-size: 10px; }
.rr-readout--dim { color: var(--ink-faint, #6a665f); }
.rr-readout--amber { color: var(--accent, oklch(0.78 0.15 70)); font-family: var(--font-mono, monospace); }
.rr-tiny-num {
  font-size: 8px; padding: 1px 3px;
  border: 1px solid var(--line, #3a3632);
  color: var(--ink-dim, #9a958e);
  border-radius: 2px;
  font-family: var(--font-mono, monospace);
}
.rr-spacer { flex: 1; }

.rr-mod__display {
  background: var(--bg-0, #0f0e0d);
  border-radius: 3px;
  height: 110px;
  padding: 4px;
  overflow: hidden;
}
.rr-mod__display--tall { height: 150px; }

.rr-mod__display-footer {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 4px;
  font-size: 9px;
  color: var(--ink-faint, #6a665f);
}

.rr-mod__knob-row {
  display: flex; gap: 3px;
  align-items: flex-start;
  padding: 6px 4px;
  border-top: 1px solid var(--line-soft, #2a2724);
  justify-content: space-around;
}
.rr-mod__knob-row--tall { height: 120px; flex-direction: column; align-items: center; }
.rr-mod__knob-row--col  { flex-direction: column; align-items: center; gap: 6px; }
.rr-mod__knob-row--secondary { padding-top: 4px; }
.rr-mod__knob-row--panel { padding: 4px; justify-content: space-around; }

.rr-mod__wave-select {
  display: flex; gap: 2px;
  padding: 4px 0;
  justify-content: center;
}
.rr-wsi {
  padding: 2px;
  color: var(--ink-faint, #6a665f);
}
.rr-wsi.is-on { color: var(--accent, oklch(0.78 0.15 70)); }

.rr-mod__filter-modes {
  display: flex; gap: 2px; padding: 3px 2px;
}
.rr-fm {
  flex: 1;
  font-size: 9px;
  text-align: center;
  padding: 2px 0;
  color: var(--ink-faint, #6a665f);
  background: var(--bg-2, #241f1b);
  border: 1px solid var(--line, #3a3632);
  border-radius: 2px;
}
.rr-fm.is-on {
  background: var(--accent-deep, #5a4628);
  color: var(--accent, oklch(0.78 0.15 70));
  border-color: var(--accent, oklch(0.78 0.15 70));
}

.rr-macros {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 8px;
}

/* ────────────────────────────────────────────────────────────── */
/* Knob                                                            */

.rr-knob {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  user-select: none;
}
.rr-knob__label {
  font-size: 8.5px;
  letter-spacing: 0.08em;
  color: var(--ink-faint, #6a665f);
  text-transform: uppercase;
}
.rr-knob--primary .rr-knob__label { color: var(--accent, oklch(0.78 0.15 70)); }
.rr-knob__value {
  font-family: var(--font-mono, monospace);
  font-size: 9px;
  color: var(--ink-dim, #9a958e);
}

/* ────────────────────────────────────────────────────────────── */
/* VSlider                                                         */

.rr-vslider {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.rr-vslider__track {
  width: 6px;
  background: var(--bg-0, #0f0e0d);
  border: 1px solid var(--line, #3a3632);
  border-radius: 2px;
  position: relative;
  flex: 1;
  cursor: ns-resize;
}
.rr-vslider__fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  border-radius: 0 0 2px 2px;
}
.rr-vslider__cap {
  position: absolute;
  left: -6px; right: -6px;
  height: 10px;
  background: var(--ink, #d9d4cd);
  border: 1px solid var(--accent, oklch(0.78 0.15 70));
  border-radius: 1px;
  transform: translateY(50%);
}
.rr-vslider__label {
  font-size: 8.5px;
  text-align: center;
  color: var(--ink-faint, #6a665f);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  line-height: 1.15;
}

/* ────────────────────────────────────────────────────────────── */
/* LED                                                             */

.rr-led {
  border-radius: 50%;
  flex-shrink: 0;
}

/* ────────────────────────────────────────────────────────────── */
/* Chip + Select                                                   */

.rr-chip {
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 2px;
  background: var(--bg-2, #241f1b);
  border: 1px solid var(--line, #3a3632);
  color: var(--ink-faint, #6a665f);
  font-family: var(--font-mono, monospace);
  letter-spacing: 0.06em;
}
.rr-chip.is-on {
  background: var(--accent-deep, #5a4628);
  color: var(--accent, oklch(0.78 0.15 70));
  border-color: var(--accent, oklch(0.78 0.15 70));
}

.rr-select {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  font-size: 10px;
  background: var(--bg-2, #241f1b);
  border: 1px solid var(--line, #3a3632);
  border-radius: 2px;
  color: var(--ink, #d9d4cd);
}
.rr-select__label { color: var(--ink-faint, #6a665f); }
.rr-select__caret { color: var(--ink-faint, #6a665f); }
.rr-select.is-amber { color: var(--accent, oklch(0.78 0.15 70)); }

/* ────────────────────────────────────────────────────────────── */
/* Slider bank + brackets                                          */

.rr-slider-bank {
  display: flex;
  gap: 8px;
  justify-content: space-around;
  flex: 1;
}
.rr-bracket-grid {
  display: grid;
  gap: 8px;
}
.rr-bracket { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.rr-bracket__line {
  height: 2px;
  background: var(--ink-dim, #9a958e);
  width: 100%;
}
.rr-bracket__label {
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--ink-dim, #9a958e);
  text-transform: uppercase;
}

/* ────────────────────────────────────────────────────────────── */
/* Program / Param buttons                                         */

.rr-progbtn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.rr-progbtn__num {
  font-family: var(--font-mono, monospace);
  font-size: 10px;
  color: var(--ink-faint, #6a665f);
}
.rr-progbtn__name {
  font-size: 10px;
  color: var(--ink, #d9d4cd);
  text-align: center;
  min-height: 14px;
}
.rr-progbtn__btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-3, #2a2724);
  border: 2px solid var(--line, #3a3632);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
  cursor: pointer;
}
.rr-progbtn__btn.is-active {
  background: var(--accent, oklch(0.78 0.15 70));
  border-color: var(--accent-deep, #5a4628);
}

.rr-parambtn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.rr-parambtn__led-wrap { height: 10px; display: flex; align-items: center; }
.rr-parambtn__led {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bg-4, #35302a);
}
.rr-parambtn__led.is-on {
  background: var(--led, oklch(0.78 0.15 70));
  box-shadow: 0 0 4px var(--led, oklch(0.78 0.15 70));
}
.rr-parambtn__btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg-3, #2a2724);
  border: 2px solid var(--line, #3a3632);
  cursor: pointer;
}
.rr-parambtn__btn.is-active {
  background: var(--accent, oklch(0.78 0.15 70));
  border-color: var(--accent-deep, #5a4628);
}
.rr-parambtn__label {
  font-size: 8.5px;
  color: var(--ink-dim, #9a958e);
  text-align: center;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  line-height: 1.1;
}

/* ────────────────────────────────────────────────────────────── */
/* LED display (STRATA)                                            */

.rr-display {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-0, #0f0e0d);
  border: 1px solid var(--line, #3a3632);
  border-radius: 4px;
  padding: 10px 14px;
  gap: 14px;
}
.rr-seg-host {
  display: flex;
  align-items: center;
}
.rr-seg-display {
  display: flex;
  align-items: center;
  gap: 2px;
}
.rr-units {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.rr-unit {
  font-size: 9px;
  color: var(--ink-faint, #6a665f);
  letter-spacing: 0.08em;
}
.rr-unit.is-on { color: var(--led, oklch(0.78 0.15 70)); }

.rr-open-indicator {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.rr-open-indicator__dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok, oklch(0.75 0.14 155));
  box-shadow: 0 0 4px var(--ok, oklch(0.75 0.14 155));
}
.rr-open-indicator__lbl {
  font-size: 8px;
  letter-spacing: 0.14em;
  color: var(--ink-faint, #6a665f);
}

.rr-display-captions {
  display: flex;
  justify-content: space-between;
  font-size: 8.5px;
  color: var(--ink-faint, #6a665f);
  letter-spacing: 0.1em;
  padding: 2px 4px;
}

/* ────────────────────────────────────────────────────────────── */
/* Stereo meter                                                    */

.rr-meter {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.rr-meter__scale {
  display: flex;
  justify-content: space-between;
  font-size: 7.5px;
  color: var(--ink-faint, #6a665f);
  letter-spacing: 0.06em;
}
.rr-meter__row {
  display: flex; align-items: center; gap: 4px;
}
.rr-meter__ch {
  font-size: 8px;
  color: var(--ink-dim, #9a958e);
  width: 10px;
}
.rr-meter__bar {
  display: flex;
  gap: 1px;
}
.rr-meter__seg {
  width: 10px; height: 6px;
  background: var(--bg-3, #2a2724);
  border-radius: 1px;
}
.rr-meter__seg.is-on {
  background: var(--ok, oklch(0.75 0.14 155));
  box-shadow: 0 0 3px var(--ok, oklch(0.75 0.14 155));
}

/* ────────────────────────────────────────────────────────────── */
/* CharacterKnob + CharacterRow — RC-20 / VHS-88 hero knobs         */

.rr-row--character {
  background: var(--bg-1, #1a1816);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 10px;
}
.rr-character {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 80px;
}
.rr-character__led {
  position: absolute;
  top: 0; left: 6px;
  width: 7px; height: 7px;
  border-radius: 2px;
  background: var(--bg-4, #35302a);
  border: 1px solid var(--line, #3a3632);
  z-index: 1;
}
.rr-character__led.is-on {
  background: var(--accent, oklch(0.78 0.15 70));
  box-shadow: 0 0 4px var(--accent, oklch(0.78 0.15 70));
  border-color: transparent;
}
.rr-character__label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  color: var(--accent, oklch(0.78 0.15 70));
}

/* ────────────────────────────────────────────────────────────── */
/* CharacterModule — tinted column with small knob cluster          */

.rr-mod--character {
  position: relative;
  background: color-mix(in oklab, var(--accent) 10%, var(--bg-1, #1a1816));
  border: 1px solid color-mix(in oklab, var(--accent) 25%, var(--line, #3a3632));
}
.rr-mod__accent-top {
  height: 2px;
  background: var(--accent);
  flex-shrink: 0;
}
.rr-mod__head--character {
  background: color-mix(in oklab, var(--accent) 20%, var(--bg-2, #241f1b));
  color: var(--accent);
}
.rr-mod__knob-grid-2x2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 6px;
}
.rr-mod__knob-cell {
  display: flex;
  justify-content: center;
  align-items: center;
}
.rr-mod__type {
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 0.14em;
  font-weight: 600;
}

/* ────────────────────────────────────────────────────────────── */
/* MorphBar                                                        */

.rr-morph {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

  <script type="text/babel" data-presets="env,react" data-type="module">
    const { useState, useRef, useEffect, useMemo } = React;

    // ─── primitives/index.js ───
/**
 * Primitive components — Knob, VSlider, LED, Chip, Select, SegDigit.
 * Ported from /Users/hydroadmin/Downloads/plugin editor/helix/knobs.jsx
 * and /Users/hydroadmin/Downloads/plugin editor/strata/app.jsx.
 *
 * Parametric — never hard-coded to a plugin's palette. Colors come from
 * CSS custom properties set by the DSL renderer (see palette.css).

// ────────────────────────────────────────────────────────────────
// Arc helpers for the rotary knob

function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = (angleDeg - 90) * (Math.PI / 180);
  return [cx + Math.cos(rad) * r, cy + Math.sin(rad) * r];
}
function arcPath(cx, cy, r, a1, a2) {
  const [x1, y1] = polarToCartesian(cx, cy, r, a1);
  const [x2, y2] = polarToCartesian(cx, cy, r, a2);
  const large = Math.abs(a2 - a1) > 180 ? 1 : 0;
  const sweep = a2 > a1 ? 1 : 0;
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} ${sweep} ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}

// ────────────────────────────────────────────────────────────────
// Knob — 270° rotary with value arc, tick, and optional bipolar layout

const ACCENT_VAR = {
  primary: 'var(--accent)',
  secondary: 'var(--accent2, var(--accent))',
  ok: 'var(--ok)',
  warn: 'var(--warn)',
};

function formatKnobValue(v, format, min = 0, max = 1) {
  const raw = min + v * (max - min);
  switch (format) {
    case 'percent': return `${Math.round(v * 100)}%`;
    case 'db':      return `${(v * 24 - 12).toFixed(1)}dB`;
    case 'semi':    return `${Math.round(v * 24 - 12)}`;
    case 'hz':      return `${Math.round(20 + v * (20000 - 20))}`;
    case 'ms':      return `${Math.round(v * 5000)}ms`;
    case 'count':   return `${Math.round(raw)}`;
    case 'pan':     return raw === 0.5 ? 'C' : raw > 0.5 ? `R${Math.round((raw - 0.5) * 200)}` : `L${Math.round((0.5 - raw) * 200)}`;
    case 'raw':
    default:        return raw.toFixed(2);
  }
}
function Knob({
  label,
  value = 0.5,
  size = 34,
  bipolar = false,
  format = 'raw',
  accent = 'primary',
  primary = false,
  showValue = true,
}) {
  const [v, setV] = useState(value);
  const drag = useRef(null);
  useEffect(() => { setV(value); }, [value]);

  const startA = -135, endA = 135;
  const angle = startA + v * (endA - startA);

  const r = size / 2 - 3;
  const cx = size / 2, cy = size / 2;
  const accentColor = ACCENT_VAR[accent] || ACCENT_VAR.primary;

  const trackD = arcPath(cx, cy, r, startA, endA);
  const valD = bipolar
    ? arcPath(cx, cy, r, Math.min(0, angle), Math.max(0, angle))
    : arcPath(cx, cy, r, startA, angle);

  const [tickX, tickY] = polarToCartesian(cx, cy, r - 2, angle);
  const [tickInX, tickInY] = polarToCartesian(cx, cy, r - 10, angle);

  const onDown = (e) => {
    e.preventDefault();
    drag.current = { y: e.clientY, v };
    const onMove = (ev) => {
      const dy = drag.current.y - ev.clientY;
      setV(Math.max(0, Math.min(1, drag.current.v + dy / 150)));
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  return (
    <div className={`rr-knob ${primary ? 'rr-knob--primary' : ''}`} onMouseDown={onDown}>
      <svg width={size} height={size} style={{ cursor: 'ns-resize', display: 'block' }}>
        <path d={trackD} stroke="var(--line)" strokeWidth="2" fill="none" strokeLinecap="round" />
        <path d={valD}   stroke={accentColor} strokeWidth="2" fill="none" strokeLinecap="round" />
        <circle cx={cx} cy={cy} r={r - 5} fill="var(--bg-3)" stroke="var(--line)" strokeWidth="0.5" />
        <line x1={tickInX} y1={tickInY} x2={tickX} y2={tickY} stroke={accentColor} strokeWidth="2" strokeLinecap="round" />
      </svg>
      {label && <div className="rr-knob__label">{label}</div>}
      {showValue && <div className="rr-knob__value">{formatKnobValue(v, format)}</div>}
    </div>
  );
}

function VSlider({ label, value = 0.7, height = 70, accent = 'primary' }) {

  const onDown = (e) => {

    const onMove = (ev) => {
      const dy = drag.current.y - ev.clientY;
      setV(Math.max(0, Math.min(1, drag.current.v + dy / height)));
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);

  return (
    <div className="rr-vslider" style={{ height: height + 18 }}>

}

// ────────────────────────────────────────────────────────────────
// 7-segment digit — ported from strata/app.jsx

const SEG_MAP = {
  '0': 'abcdef', '1': 'bc', '2': 'abged', '3': 'abgcd', '4': 'fgbc',
  '5': 'afgcd', '6': 'afgecd', '7': 'abc', '8': 'abcdefg', '9': 'abcdfg',
  '-': 'g', ' ': '', '.': '.',
};

const SEG_PATHS = {
  a: 'M4 2 L8 2 L36 2 L40 6 L36 10 L8 10 L4 6 Z',
  b: 'M42 4 L46 8 L46 36 L42 40 L38 36 L38 12 Z',
  c: 'M42 44 L46 48 L46 76 L42 80 L38 76 L38 52 Z',
  d: 'M4 82 L8 78 L36 78 L40 82 L36 86 L8 86 Z',
  e: 'M2 44 L6 48 L6 76 L2 80 L-2 76 L-2 48 Z',
  f: 'M2 4 L6 8 L6 36 L2 40 L-2 36 L-2 8 Z',
  g: 'M4 44 L8 40 L36 40 L40 44 L36 48 L8 48 Z',
};
function SegDigit({ ch, size = 56, on = true }) {
  const segs = SEG_MAP[ch] || '';
  const w = size * 0.6, h = size;
  const segCol = (s) => (segs.includes(s) && on ? 'var(--led)' : 'var(--led-off, oklch(0.2 0.01 60))');
  const segGlow = (s) => (segs.includes(s) && on ? 'drop-shadow(0 0 3px var(--led-glow, var(--led)))' : 'none');
  return (
    <svg width={w} height={h} viewBox="-4 0 50 90" style={{ display: 'block' }}>
      {['a', 'b', 'c', 'd', 'e', 'f', 'g'].map((s) => (
        <path key={s} d={SEG_PATHS[s]} fill={segCol(s)} style={{ filter: segGlow(s) }} />
      ))}
    </svg>
  );
}
function SegDot({ size = 56, on = true }) {
  return (
    <svg width={size * 0.18} height={size} viewBox="0 0 12 90" style={{ display: 'block' }}>
      <circle
        cx="6" cy="82" r="4"
        fill={on ? 'var(--led)' : 'var(--led-off, oklch(0.2 0.01 60))'}
        style={{ filter: on ? 'drop-shadow(0 0 3px var(--led-glow, var(--led)))' : 'none' }}
      />
    </svg>
  );
}
function SegDisplay({ value = '2.4', size = 52 }) {
  const out = [];
  for (let i = 0; i < value.length; i++) {
    if (value[i] === '.') out.push(<SegDot key={i} size={size} />);
    else out.push(<SegDigit key={i} ch={value[i]} size={size} />);

  return <div className="rr-seg-display">{out}</div>;
}

// ────────────────────────────────────────────────────────────────
// CharacterKnob — big cream-faced hero knob for lo-fi/color processors.
// Has: optional bypass LED square in top-left, 60-tick grooved rim,
// single darker indicator line, label below. Larger than Knob (default
// 78px vs 34px) and visually distinct — reads as the hero of a row.
function CharacterKnob({
  label,
  value = 0.5,
  active = true,
  tint = 'var(--accent)',
  size = 78,
  showLed = true,
}) {
  const [v, setV] = useState(value);
  const drag = useRef(null);
  useEffect(() => { setV(value); }, [value]);

  const angle = -135 + v * 270;
  const r = size / 2 - 4;
  const cx = size / 2, cy = size / 2;

  const ticks = [];
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * 360 - 90;
    const rad = (a - 90) * Math.PI / 180;
    const inner = r + 2;
    const outer = r + 5;
    ticks.push(
      <line
        key={i}
        x1={cx + Math.cos(rad) * inner}
        y1={cy + Math.sin(rad) * inner}
        x2={cx + Math.cos(rad) * outer}
        y2={cy + Math.sin(rad) * outer}
        stroke="var(--ink-faint)"
        strokeWidth="0.8"
      />
    );
  }

  const indRad = (angle - 90) * Math.PI / 180;
  const indX = cx + Math.cos(indRad) * (r - 8);
  const indY = cy + Math.sin(indRad) * (r - 8);

  const onDown = (e) => {
    e.preventDefault();
    drag.current = { y: e.clientY, v };
    const onMove = (ev) => {
      const dy = drag.current.y - ev.clientY;
      setV(Math.max(0, Math.min(1, drag.current.v + dy / 150)));
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  return (
    <div className="rr-character">
      {showLed && (
        <div
          className={`rr-character__led ${active ? 'is-on' : ''}`}
          style={active ? { background: tint, boxShadow: `0 0 4px ${tint}` } : null}
        />
      )}
      <svg width={size + 12} height={size + 12} style={{ cursor: 'ns-resize', display: 'block' }} onMouseDown={onDown}>
        <g transform={`translate(6, 6)`}>
          {ticks}
          <circle
            cx={cx} cy={cy} r={r - 2}
            fill="var(--ink)"
            stroke="var(--line)"
            strokeWidth="1"
          />
          <circle
            cx={cx} cy={cy} r={r - 6}
            fill="none"
            stroke="var(--line-soft)"
            strokeWidth="0.5"
          />
          <line
            x1={cx} y1={cy} x2={indX} y2={indY}
            stroke="var(--bg-0)"
            strokeWidth="2.5"
            strokeLinecap="round"
          />
          <circle cx={cx} cy={cy} r="2" fill="var(--bg-0)" />
        </g>
      </svg>
      <div className="rr-character__label" style={{ color: tint }}>{label}</div>
    </div>
  );
}

/**
 * Procedural displays — pure SVG, all styling via CSS custom properties.
 * Ported 1:1 from /Users/hydroadmin/Downloads/plugin editor/helix/displays.jsx

// ────────────────────────────────────────────────────────────────
// Wavetable — stacked flyover (OSC A, B)
function WavetableStacked({ layers = 14, variant = 'sin' }) {
  const lines = [];
  for (let i = 0; i < layers; i++) {
    const yOff = 8 + i * 6;
    const amp = 22 - i * 1.1;
    const phase = i * 0.4;
    let d = '';
    for (let x = 0; x <= 240; x += 4) {
      const t = x / 240;
      let y;
      if (variant === 'saw') {
        y = yOff + amp * (2 * (t - Math.floor(t + 0.5))) * (1 - i * 0.04);
      } else {
        y = yOff + amp * Math.sin(t * Math.PI * 3 + phase) * Math.exp(-t * 0.3) * (1 - i * 0.04);
      }
      d += (x === 0 ? 'M' : 'L') + x + ' ' + y.toFixed(2) + ' ';
    }
    const opacity = 0.25 + (i / layers) * 0.75;
    lines.push(<path key={i} d={d} stroke="var(--accent)" strokeWidth="1" fill="none" opacity={opacity} />);
  }
  return (
    <svg width="100%" height="100%" viewBox="0 0 240 110" preserveAspectRatio="none">
      {[0, 1, 2, 3].map((i) => (
        <line key={i} x1="0" x2="240" y1={i * 28} y2={i * 28} stroke="var(--line-soft)" strokeWidth="0.5" />
      ))}
      {lines}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Wavetable — stepped morph
function WavetableStepped({ layers = 10 }) {
  const lines = [];
  for (let i = 0; i < layers; i++) {
    const yOff = 12 + i * 9;
    const amp = 18 - i * 0.6;
    const steps = 8 + i;
    let d = '';
    for (let s = 0; s <= steps; s++) {
      const x = (s / steps) * 240;
      const y = yOff - amp + (s % 2) * amp * 2 * (1 - s / steps);
      d += (s === 0 ? 'M' : 'L') + x + ' ' + y.toFixed(2) + ' ';
    }
    const opacity = 0.35 + (i / layers) * 0.65;
    lines.push(<path key={i} d={d} stroke="var(--accent)" strokeWidth="1" fill="none" opacity={opacity} />);
  }
  return (
    <svg width="100%" height="100%" viewBox="0 0 240 110" preserveAspectRatio="none">
      {[0, 1, 2, 3].map((i) => (
        <line key={i} x1="0" x2="240" y1={i * 28} y2={i * 28} stroke="var(--line-soft)" strokeWidth="0.5" />
      ))}
      {lines}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Granular sample
function GranularSample({ cursor = 0.23 }) {
  const bars = [];
  for (let i = 0; i < 120; i++) {
    const t = i / 120;
    const env = Math.pow(1 - Math.abs(t - 0.3) * 2, 2) * (1 - t * 0.5);
    const noise = (Math.sin(i * 1.7) * 0.5 + Math.sin(i * 0.83) * 0.5) * 0.5 + 0.5;
    const h = Math.max(2, Math.abs(env * noise) * 45);
    bars.push(<rect key={i} x={i * 2.1} y={55 - h} width="1.3" height={h * 2} fill="var(--ok)" opacity={0.85} />);
  }
  const cur = cursor * 260;
  return (
    <svg width="100%" height="100%" viewBox="0 0 260 110" preserveAspectRatio="none">
      <line x1="0" x2="260" y1="55" y2="55" stroke="var(--line-soft)" strokeWidth="0.5" />
      {bars}
      <line x1={cur} x2={cur} y1="5" y2="105" stroke="var(--accent)" strokeWidth="1" opacity="0.8" />
      <rect x={cur - 3} y="3" width="6" height="4" fill="var(--accent)" />
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Noise waveform
function NoiseWave() {
  const bars = [];
  for (let i = 0; i < 60; i++) {
    const h = (Math.sin(i * 1.3) * 0.5 + Math.cos(i * 2.1) * 0.5 + ((i * 17) % 7) / 7) * 25 + 8;
    bars.push(<rect key={i} x={i * 2} y={55 - h / 2} width="1.2" height={h} fill="var(--ink-dim)" opacity={0.7} />);
  }
  return (
    <svg width="100%" height="100%" viewBox="0 0 120 110" preserveAspectRatio="none">
      <line x1="0" x2="120" y1="55" y2="55" stroke="var(--line-soft)" strokeWidth="0.5" />
      {bars}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Filter response curve — parametric: cutoff/res/hue
function FilterCurve({ cutoff = 0.4, res = 0.4, hue = 'amber' }) {
  const pts = [];
  const c = Math.max(0.05, Math.min(0.95, cutoff));
  for (let i = 0; i <= 80; i++) {
    const x = i / 80;
    const cutoffEffect = 1 / (1 + Math.pow(x / c, 8));
    const resonance = Math.exp(-Math.pow((x - c) / 0.05, 2)) * (0.3 + res);
    const y = Math.max(0.02, Math.min(1, cutoffEffect + resonance));
    pts.push([x * 160, 85 - y * 75]);
  }
  const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ' ' + p[1].toFixed(1)).join(' ');
  const fill = d + ` L 160 90 L 0 90 Z`;
  const color = hue === 'warn' ? 'var(--warn)' : hue === 'ok' ? 'var(--ok)' : 'var(--accent)';
  return (
    <svg width="100%" height="100%" viewBox="0 0 160 95" preserveAspectRatio="none">
      {[0, 1, 2, 3].map((i) => (
        <line key={i} x1="0" x2="160" y1={20 + i * 18} y2={20 + i * 18} stroke="var(--line-soft)" strokeWidth="0.5" />
      ))}
      <path d={fill} fill={color} opacity="0.12" />
      <path d={d} stroke={color} strokeWidth="1.3" fill="none" />
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// ADSR envelope curve — parametric
function EnvCurve({ atk = 0.15, dec = 0.25, sus = 0.6, rel = 0.35 }) {
  const x0 = 20, x1 = 320;
  const yTop = 35, yBot = 135;
  const span = x1 - x0;
  const ax = x0 + atk * span * 0.25;
  const dx = ax + dec * span * 0.25;
  const sx = x0 + span * 0.72;
  const rx = x1;
  const ay = yTop;
  const dy = yTop + (1 - sus) * (yBot - yTop);
  const sy = dy;
  const ry = yBot;

  const d = `M ${x0} ${yBot} L ${ax} ${ay} Q ${ax + 8} ${ay + 5} ${dx} ${dy} L ${sx} ${sy} Q ${sx + 30} ${sy + 10} ${rx} ${ry}`;

  return (
    <svg width="100%" height="100%" viewBox="0 0 340 150" preserveAspectRatio="none">
      <defs>
        <linearGradient id="rr-env-grad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"   stopColor="var(--accent)" stopOpacity="0.4" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 1, 2, 3].map((i) => (
        <line key={i} x1="20" x2="320" y1={25 + i * 37} y2={25 + i * 37} stroke="var(--line-soft)" strokeWidth="0.5" />
      ))}
      {[0, 1, 2, 3, 4].map((i) => (
        <line key={`v${i}`} x1={20 + i * 75} x2={20 + i * 75} y1="20" y2="140" stroke="var(--line-soft)" strokeWidth="0.5" />
      ))}
      <path d={`${d} L ${rx} ${yBot} L ${x0} ${yBot} Z`} fill="url(#rr-env-grad)" />
      <path d={d} stroke="var(--accent)" strokeWidth="1.5" fill="none" />
      {[[ax, ay], [dx, dy], [sx, sy], [rx, ry]].map(([cx, cy], i) => (
        <circle key={i} cx={cx} cy={cy} r="3" fill="var(--accent)" />
      ))}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// LFO curve — accepts [x,y] points, 0..1 normalized
function LFOCurve({ points }) {
  const defaultPts = [
    [10, 90], [40, 40], [90, 20], [140, 30], [190, 70],
    [220, 110], [190, 140], [140, 130], [100, 100], [60, 120], [30, 140],
  ];
  const pts = points && points.length > 2 ? points.map(([x, y]) => [x * 240, y * 160]) : defaultPts;
  const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ' ' + p[1]).join(' ');
  return (
    <svg width="100%" height="100%" viewBox="0 0 240 160" preserveAspectRatio="xMidYMid meet">
      <line x1="0" x2="240" y1="80" y2="80" stroke="var(--line-soft)" strokeWidth="0.5" />
      <path d={d} stroke="var(--accent)" strokeWidth="1.3" fill="none" />
      {pts.map((p, i) => (
        <circle
          key={i}
          cx={p[0]}
          cy={p[1]}
          r="3"
          fill={i === 0 || i === pts.length - 1 ? 'var(--accent)' : 'var(--bg-1)'}
          stroke="var(--accent)"
          strokeWidth="1.3"
        />
      ))}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Velocity curve
function VelocityCurve({ curve = 1 }) {
  // curve < 1 ⇒ soft, > 1 ⇒ aggressive. Draws y = x^curve on [0,1].
  const pts = [];
  for (let i = 0; i <= 24; i++) {
    const t = i / 24;
    const y = Math.pow(t, curve);
    pts.push([10 + t * 100, 125 - y * 110]);
  }
  const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  return (
    <svg width="100%" height="100%" viewBox="0 0 120 140" preserveAspectRatio="none">
      {[0, 1, 2, 3].map((i) => (
        <line key={i} x1="0" x2="120" y1={10 + i * 40} y2={10 + i * 40} stroke="var(--line-soft)" strokeWidth="0.5" />
      ))}
      <path d={d} stroke="var(--ok)" strokeWidth="1.5" fill="none" />
      <circle cx={pts[0][0]} cy={pts[0][1]} r="2.5" fill="var(--ok)" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="2.5" fill="var(--ok)" />
    </svg>
  );
}

  const W = 240;

  // Seeded starfield so it's stable across renders
  const nodes = [];

  for (let i = 0; i < 60; i++) {

    const dist = 20 + rand() * (W / 2 - 30);
    nodes.push({

// ────────────────────────────────────────────────────────────────
// ModLane display — step or curve mode
function ModLane({ points = [0.3, 0.7, 0.3, 0.8, 0.2, 0.5, 0.2, 0.8, 0.4, 0.6, 0.3, 0.7], mode = 'step', color = 'var(--accent)' }) {
  const W = 260, H = 120;
  const stepX = (i) => 8 + (i / Math.max(1, points.length - 1)) * (W - 16);
  const y = (v) => 10 + (1 - v) * (H - 20);
  let path = '';
  if (mode === 'step') {
    points.forEach((v, i) => {
      const x = stepX(i);
      if (i === 0) path += `M ${x} ${y(v)}`;
      else path += ` L ${x} ${y(points[i - 1])} L ${x} ${y(v)}`;
    });
  } else {
    points.forEach((v, i) => {
      const x = stepX(i);
      if (i === 0) path += `M ${x} ${y(v)}`;
      else {
        const xp = stepX(i - 1), yp = y(points[i - 1]);
        const xc = (xp + x) / 2;
        path += ` Q ${xc} ${yp} ${x} ${y(v)}`;
      }
    });
  }
  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
      <rect width={W} height={H} fill="var(--bg-0)" rx="3" />
      <line x1="0" x2={W} y1={H / 2} y2={H / 2} stroke="var(--line-soft)" strokeWidth="0.5" />
      <path d={path} fill="none" stroke={color} strokeWidth="1.8" />
      {points.map((v, i) => (
        <circle key={i} cx={stepX(i)} cy={y(v)} r="3" fill={color} />
      ))}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Keyboard strip
function Keyboard({ octaves = 4, pressed = [] }) {
  const whitesPerOct = 7;
  const totalWhites = octaves * whitesPerOct;
  const whiteW = 100 / totalWhites;
  const blackPattern = [true, true, false, true, true, true, false]; // after C,D,F,G,A
  const whiteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];

  const pressedSet = new Set(pressed);

  const whites = [];
  const blacks = [];
  let midi = 24; // C1-ish
  for (let o = 0; o < octaves; o++) {
    for (let w = 0; w < whitesPerOct; w++) {
      const idx = o * whitesPerOct + w;
      const x = idx * whiteW;
      whites.push(
        <rect
          key={`w${idx}`}
          x={`${x}%`} y="0"
          width={`${whiteW}%`}
          height="100%"
          fill={pressedSet.has(midi) ? 'var(--accent)' : 'var(--ink)'}
          stroke="var(--line)"
          strokeWidth="0.3"
        />
      );
      // one black key per white except at E, B
      if (blackPattern[w]) {
        const bx = x + whiteW * 0.7;
        const bw = whiteW * 0.6;
        blacks.push(
          <rect
            key={`b${idx}`}
            x={`${bx}%`} y="0"
            width={`${bw}%`}
            height="62%"
            fill={pressedSet.has(midi + 1) ? 'var(--accent)' : 'var(--bg-0)'}
            stroke="var(--line)"
            strokeWidth="0.3"
          />
        );
      }
      midi += blackPattern[w] ? 2 : 1;
    }
  }

  return (
    <svg width="100%" height="100%" preserveAspectRatio="none" style={{ display: 'block' }}>
      {whites}
      {blacks}
    </svg>
  );
}

// ────────────────────────────────────────────────────────────────
// Module dispatcher
function renderModule(module, idx) {
  switch (module.kind) {
    case 'sub':              return <SubOscModule        key={idx} module={module} />;
    case 'wavetable-osc':    return <WavetableOscModule  key={idx} module={module} />;
    case 'noise':            return <NoiseModule         key={idx} module={module} />;
    case 'filter':           return <FilterModule        key={idx} module={module} />;
    case 'envelope':         return <EnvelopeModule      key={idx} module={module} />;
    case 'lfo':              return <LFOModule           key={idx} module={module} />;
    case 'macros':           return <MacrosModule        key={idx} module={module} />;
    case 'velocity':         return <VelocityModule      key={idx} module={module} />;
    case 'character-module': return <CharacterModule     key={idx} module={module} />;
    case 'xy-pad':           return <XYPadModule         key={idx} module={module} />;
    case 'mod-lane':         return <ModLaneModule       key={idx} module={module} />;
    case 'knob-bank':        return <KnobBankModule      key={idx} module={module} />;
    default:
      // Graceful unknown fallback — renders as a generic knob-bank so
      // Qwen can propose novel combinations without breaking visually.
      if (module.knobs) return <KnobBankModule key={idx} module={{ ...module, label: module.label || module.kind }} />;
      return (
        <div key={idx} className="rr-mod rr-mod--unknown">
          <div className="rr-mod__head">unknown: {module.kind}</div>
        </div>
      );
  }
}


// ─── rows/index.js ───
/**
 * Row renderers — module-strip, mod-matrix, keyboard-strip, button-row,
 * slider-bank, led-display. Each consumes a RowSpec and emits a
 * horizontally-laid-out band in the plugin canvas.
 */




// ────────────────────────────────────────────────────────────────
function ModuleStripRow({ row }) {
  return (
    <div className="rr-row rr-row--modules" style={{ height: row.height || 340 }}>
      {(row.modules || []).map((mod, i) => renderModule(mod, i))}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
function ModMatrixRow({ row }) {
  // mod-matrix rows are panels side-by-side, each rendered via the module
  // dispatcher using the panel's `kind` as the module kind.
  return (
    <div className="rr-row rr-row--modmatrix" style={{ height: row.height || 220 }}>
      {(row.panels || []).map((panel, i) =>
        renderModule(
          { ...panel, kind: panel.kind },
          i,
        ),
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
function KeyboardStripRow({ row }) {
  const { spec = {} } = row;
  return (
    <div className="rr-row rr-row--keyboard" style={{ height: row.height || 70 }}>
      <Keyboard octaves={spec.octaves || 4} pressed={spec.pressed || []} />
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
function ButtonRow({ row }) {
  const buttons = row.buttons || [];
  const isProgram = row.style === 'program';
  return (
    <div className={`rr-row rr-row--buttons ${isProgram ? 'is-program' : 'is-param'}`} style={{ height: row.height || 82 }}>
      {buttons.map((b, i) =>
        isProgram ? (
          <ProgramButton
            key={i}
            n={b.n ?? i + 1}
            name={b.name || b.label}
            active={!!b.active}
          />
        ) : (
          <ParamButton
            key={i}
            label={b.label || ''}
            ledOn={!!b.ledOn}
            active={!!b.active}
          />
        ),
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
function SliderBankRow({ row }) {
  const sliders = row.sliders || [];
  const brackets = row.brackets || [];
  return (
    <div className="rr-row rr-row--sliders" style={{ height: row.height || 180 }}>
      <div className="rr-slider-bank">
        {sliders.map((s, i) => (
          <VSlider

// EQ-strip — compact footer row: IN GAIN · EQ CUT band · OUT WIDTH/GAIN.

        <div className="rr-eq-block">

// ────────────────────────────────────────────────────────────────
// Row dispatcher
function renderRow(row, idx) {
  switch (row.kind) {
    case 'module-strip':   return <ModuleStripRow   key={idx} row={row} />;
    case 'mod-matrix':     return <ModMatrixRow     key={idx} row={row} />;
    case 'keyboard-strip': return <KeyboardStripRow key={idx} row={row} />;
    case 'button-row':     return <ButtonRow        key={idx} row={row} />;
    case 'slider-bank':    return <SliderBankRow    key={idx} row={row} />;
    case 'led-display':    return <LedDisplayRow    key={idx} row={row} />;

      return (
        <div key={idx} className="rr-row rr-row--unknown" style={{ height: row.height || 100 }}>
          unknown row: {row.kind}
        </div>
      );
  }
}


// ─── renderDSL.js ───
/**
 * renderDSL(dsl) → React element. Pure function: same DSL → same tree.
 *
 * - Injects palette as CSS custom properties on a root container.
 * - Wires Google Fonts from dsl.type.
 * - Walks dsl.rows and delegates to row renderers.
 */



// Google Font loader — idempotent, attaches a <link> per unique family
const loadedFonts = new Set();
function loadGoogleFont(family) {
  if (!family || loadedFonts.has(family)) return;
  loadedFonts.add(family);
  if (typeof document === 'undefined') return;
  const href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family).replace(/%20/g, '+')}:wght@400;500;600;700&display=swap`;
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = href;
  link.dataset.rrFont = family;
  document.head.appendChild(link);
}

function buildPaletteVars(palette, type) {
  const p = palette || {};
  const t = type || {};
  const vars = {};

  (p.bg || []).forEach((c, i) => { vars[`--bg-${i}`] = c; });
  (p.ink || []).forEach((c, i) => {
    const name = ['--ink', '--ink-dim', '--ink-faint', '--ink-ghost'][i] || `--ink-${i}`;
    vars[name] = c;
  });
  if (p.line)      vars['--line'] = p.line;
  if (p.lineSoft)  vars['--line-soft'] = p.lineSoft;
  if (p.accent)    vars['--accent'] = p.accent;
  if (p.accent2)   vars['--accent2'] = p.accent2;
  if (p.led)       { vars['--led'] = p.led; vars['--led-glow'] = p.led; }
  if (p.ok)        vars['--ok'] = p.ok;
  if (p.warn)      vars['--warn'] = p.warn;

  if (t.ui)      vars['--font-ui']    = `'${t.ui}', system-ui, sans-serif`;
  if (t.mono)    vars['--font-mono']  = `'${t.mono}', ui-monospace, monospace`;
  if (t.brand)   vars['--font-brand'] = `'${t.brand}', serif`;
  if (t.display) vars['--font-display'] = `'${t.display}', sans-serif`;

  return vars;
}

function Header({ header, meta }) {
  if (!header) return null;
  return (
    <div className="rr-header">
      <div className="rr-brand">
        <div className="rr-brand__logo">{(meta?.name || 'X')[0]}</div>
        <div>
          <div className="rr-brand__name">{meta?.name}</div>
          <div className="rr-brand__sub">
            {(meta?.productType || '').toUpperCase()}{meta?.version ? ' · ' + meta.version : ''}
          </div>
        </div>
      </div>
      {header.tabs && (
        <div className="rr-tabs">
          {header.tabs.map((t, i) => (
            <div key={t} className={`rr-tab ${i === 0 ? 'is-active' : ''}`}>{t}</div>
          ))}
        </div>
      )}
      {header.preset && (
        <div className="rr-patchbar">
          <span className="rr-patchbar__name">
            PRESET — {header.preset.name}
          </span>
          <span className="rr-patchbar__meta">
            <span className="rr-k">AUTHOR</span>
            <span className="rr-v">{header.preset.author || '—'}</span>
          </span>
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
function RenderDSL({ dsl, fit = true }) {
  useEffect(() => {
    const t = dsl?.type;
    if (t) {
      loadGoogleFont(t.brand);
      loadGoogleFont(t.ui);
      loadGoogleFont(t.mono);
      if (t.display) loadGoogleFont(t.display);
    }
  }, [dsl?.type?.brand, dsl?.type?.ui, dsl?.type?.mono, dsl?.type?.display]);

  if (!dsl) return null;

  const [canvasW, canvasH] = dsl.meta?.canvas || [1280, 800];
  const vars = buildPaletteVars(dsl.palette, dsl.type);

  return (
    <div
      className={`rr-shell rr-chassis--${dsl.meta?.chassis || 'plugin-window'}`}
      style={{
        ...vars,
        width: canvasW,
        height: canvasH,
        fontFamily: vars['--font-ui'] || 'system-ui, sans-serif',
      }}
    >
      <Header header={dsl.header} meta={dsl.meta} />
      <div className="rr-body">
        {(dsl.rows || []).map((row, i) => renderRow(row, i))}
      </div>
    </div>
  );
}

// Convenience: validate and either render or show errors.
function RenderDSLSafe({ dsl }) {
  const { ok, errors } = validatePluginDSL(dsl);
  if (!ok) {
    return (
      <pre className="rr-error">
        DSL invalid:{'\n'}
        {errors.map((e) => `  - ${e}`).join('\n')}
      </pre>
    );
  }
  return <RenderDSL dsl={dsl} />;
