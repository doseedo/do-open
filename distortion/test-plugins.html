<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugin Test Suite</title>
</head>
<body>
  <h1>Distortion Plugin Test Suite</h1>
  <div id="results"></div>

  <script src="Overdrive.js"></script>
  <script src="Saturator.js"></script>
  <script src="Distortion.js"></script>
  <script src="Redux.js"></script>

  <script>
    const results = document.getElementById('results');
    let testsPassed = 0;
    let testsFailed = 0;

    function log(message, success = true) {
      const p = document.createElement('p');
      p.textContent = message;
      p.style.color = success ? 'green' : 'red';
      results.appendChild(p);
      if (success) testsPassed++;
      else testsFailed++;
    }

    function test(name, fn) {
      try {
        fn();
        log(`✓ ${name}`, true);
      } catch (e) {
        log(`✗ ${name}: ${e.message}`, false);
      }
    }

    // Create audio context
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    // Test Overdrive
    test('Overdrive: Constructor', () => {
      const od = new Overdrive(audioContext);
      if (!od.input || !od.output) throw new Error('Missing nodes');
    });

    test('Overdrive: Set drive', () => {
      const od = new Overdrive(audioContext);
      od.setDrive(50);
      if (od.params.drive !== 50) throw new Error('Drive not set');
    });

    test('Overdrive: Set tone', () => {
      const od = new Overdrive(audioContext);
      od.setTone(75);
      if (od.params.tone !== 75) throw new Error('Tone not set');
    });

    test('Overdrive: Set bias', () => {
      const od = new Overdrive(audioContext);
      od.setBias(-50);
      if (od.params.bias !== -50) throw new Error('Bias not set');
    });

    test('Overdrive: Connect/disconnect', () => {
      const od = new Overdrive(audioContext);
      const gain = audioContext.createGain();
      od.connect(gain);
      od.disconnect();
    });

    // Test Saturator
    test('Saturator: Constructor', () => {
      const sat = new Saturator(audioContext);
      if (!sat.input || !sat.output) throw new Error('Missing nodes');
    });

    test('Saturator: Set type', () => {
      const sat = new Saturator(audioContext);
      sat.setType('analog');
      if (sat.params.type !== 'analog') throw new Error('Type not set');
    });

    test('Saturator: Set drive', () => {
      const sat = new Saturator(audioContext);
      sat.setDrive(60);
      if (sat.params.drive !== 60) throw new Error('Drive not set');
    });

    test('Saturator: Set color', () => {
      const sat = new Saturator(audioContext);
      sat.setColor(40);
      if (sat.params.color !== 40) throw new Error('Color not set');
    });

    // Test Distortion
    test('Distortion: Constructor', () => {
      const dist = new Distortion(audioContext);
      if (!dist.input || !dist.output) throw new Error('Missing nodes');
    });

    test('Distortion: Set clip type', () => {
      const dist = new Distortion(audioContext);
      dist.setClipType('asymmetric');
      if (dist.params.clipType !== 'asymmetric') throw new Error('Clip type not set');
    });

    test('Distortion: Set tone', () => {
      const dist = new Distortion(audioContext);
      dist.setTone(2000);
      if (dist.params.tone !== 2000) throw new Error('Tone not set');
    });

    test('Distortion: Set filter position', () => {
      const dist = new Distortion(audioContext);
      dist.setFilterPosition('pre');
      if (dist.params.filterPosition !== 'pre') throw new Error('Filter position not set');
    });

    // Test Redux
    test('Redux: Constructor', () => {
      const rdx = new Redux(audioContext);
      if (!rdx.input || !rdx.output) throw new Error('Missing nodes');
    });

    test('Redux: Set bit depth', () => {
      const rdx = new Redux(audioContext);
      rdx.setBitDepth(4);
      if (rdx.params.bitDepth !== 4) throw new Error('Bit depth not set');
    });

    test('Redux: Set sample rate', () => {
      const rdx = new Redux(audioContext);
      rdx.setSampleRate(11025);
      if (rdx.params.sampleRate !== 11025) throw new Error('Sample rate not set');
    });

    test('Redux: Set dither', () => {
      const rdx = new Redux(audioContext);
      rdx.setDither(25);
      if (rdx.params.dither !== 25) throw new Error('Dither not set');
    });

    // Test parameter bounds
    test('Overdrive: Drive bounds', () => {
      const od = new Overdrive(audioContext);
      od.setDrive(150); // Over max
      if (od.params.drive !== 100) throw new Error('Drive not clamped');
      od.setDrive(-10); // Under min
      if (od.params.drive !== 0) throw new Error('Drive not clamped');
    });

    test('Redux: Bit depth bounds', () => {
      const rdx = new Redux(audioContext);
      rdx.setBitDepth(20); // Over max
      if (rdx.params.bitDepth !== 16) throw new Error('Bit depth not clamped');
      rdx.setBitDepth(0); // Under min
      if (rdx.params.bitDepth !== 1) throw new Error('Bit depth not clamped');
    });

    // Summary
    setTimeout(() => {
      const summary = document.createElement('h2');
      summary.textContent = `Tests: ${testsPassed} passed, ${testsFailed} failed`;
      summary.style.color = testsFailed === 0 ? 'green' : 'orange';
      results.insertBefore(summary, results.firstChild);

      if (testsFailed === 0) {
        const success = document.createElement('h3');
        success.textContent = '🎉 All tests passed!';
        success.style.color = 'green';
        results.insertBefore(success, results.firstChild);
      }
    }, 100);
  </script>
</body>
</html>
